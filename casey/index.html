<script>
    // Чекаємо повного завантаження сторінки
    document.addEventListener("DOMContentLoaded", () => {
        try {
            const newestToOldestIds = ["ipLRsAN-SJM", /* ... ТУТ ТВІЙ МАСИВ З 1000+ ID ... */ "D2qO5nMOM5U"];
            const videoIds = newestToOldestIds.reverse();
            
            let savedIndex = localStorage.getItem('caseyAllIndex');
            let currentIndex = savedIndex ? parseInt(savedIndex) : 0;

            if (currentIndex < videoIds.length) {
                let nextVideoId = videoIds[currentIndex];
                localStorage.setItem('caseyAllIndex', currentIndex + 1);
                
                // Затримка 500мс, щоб Safari не вважав це спам-редиректом
                setTimeout(() => {
                    window.location.replace(`https://www.youtube.com/watch?v=${nextVideoId}`);
                }, 500);
            } else {
                document.body.innerHTML = "<div style='text-align: center;'><h2>Ти переглянув усі відео на каналі!</h2></div>";
            }
        } catch (error) {
            // Якщо є помилка в коді, вона виведеться на екран
            document.body.innerHTML = `<div style='text-align: center; color: red;'><h2>Помилка: ${error.message}</h2></div>`;
        }
    });
</script>
