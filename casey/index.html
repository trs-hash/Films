<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Casey">
    <title>Casey Vlogs</title>
    <style>
        /* Весь екран тепер реагує на клік (курсор-показник) */
        body { background-color: #111; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
        .loader { border: 4px solid #333; border-top: 4px solid #ff0000; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .sub-text { color: #888; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body id="main-body">
    <div id="content">
        <div class="status" id="status-text">Запускаємо...</div>
        <div class="loader" id="loader"></div>
        <div class="sub-text" id="hint"></div>
    </div>
    <script>
        // ОБОВ'ЯЗКОВО встав сюди свій повний масив ID відео замість коментаря
        const newestToOldestIds = [
            /* ТУТ ТВІЙ МАСИВ З 1000+ ID ВІДЕО */
        ];
        
        const videoIds = newestToOldestIds.reverse();
        let isNavigating = false;

        function playNextVideo() {
            if (isNavigating) return;
            
            let savedIndex = localStorage.getItem('caseyAppIndex');
            let currentIndex = savedIndex ? parseInt(savedIndex) : 0;

            if (currentIndex < videoIds.length) {
                isNavigating = true;
                let nextVideoId = videoIds[currentIndex];
                
                // Оновлюємо інтерфейс
                document.getElementById('status-text').innerText = `Готуємо відео #${currentIndex + 1}`;
                document.getElementById('hint').innerText = "";
                document.getElementById('loader').style.display = "block";

                // Спроба автоматичного переходу
                setTimeout(() => {
                    window.location.href = `youtube://watch?v=${nextVideoId}`;
                    
                    // Захист від блокування iOS: якщо через 1 секунду ми ще тут, просимо торкнутися екрана
                    setTimeout(() => {
                        isNavigating = false;
                        document.getElementById('status-text').innerText = "iOS заблокувала автозапуск";
                        document.getElementById('hint').innerHTML = "<span style='color:#ff0000; font-size:20px;'>Тапни будь-де на екрані</span>";
                        document.getElementById('loader').style.display = "none";
                        
                        // Робимо весь екран клікабельним для запуску
                        document.getElementById('main-body').onclick = () => {
                            localStorage.setItem('caseyAppIndex', currentIndex + 1);
                            window.location.href = `youtube://watch?v=${nextVideoId}`;
                            
                            // Скидаємо інтерфейс для наступного разу
                            setTimeout(() => { document.getElementById('status-text').innerText = "Очікування..."; }, 1000);
                        };
                    }, 1000);
                }, 300);
                
                // Якщо автозапуск вдався (ми перейшли в YouTube), зберігаємо індекс
                // Це виконується майже одночасно з редіректом
                localStorage.setItem('caseyAppIndex', currentIndex + 1);

            } else {
                document.getElementById('content').innerHTML = 
                    "<div class='status'>Всі відео переглянуто!</div>" + 
                    "<button style='margin-top:20px; padding:15px; font-size:16px;' onclick='localStorage.removeItem(\"caseyAppIndex\"); window.location.reload();'>Почати спочатку</button>";
            }
        }

        // Запуск при відкритті
        document.addEventListener("DOMContentLoaded", playNextVideo);
        
        // Запуск при поверненні в програму (зняття з паузи)
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'visible') {
                isNavigating = false; // скидаємо блокування
                playNextVideo();
            }
        });
        
        // Альтернативна подія для Safari (коли сторінка відновлюється з кешу)
        window.addEventListener("pageshow", (e) => {
            if (e.persisted) {
                isNavigating = false;
                playNextVideo();
            }
        });
    </script>
</body>
</html>
