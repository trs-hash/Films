        const videoIds = newestToOldestIds.reverse();

        // Функція для запуску відео та оновлення інтерфейсу
        function playNextVideo() {
            let savedIndex = localStorage.getItem('caseyAppIndex');
            let currentIndex = savedIndex ? parseInt(savedIndex) : 0;

            if (currentIndex < videoIds.length) {
                let nextVideoId = videoIds[currentIndex];
                
                // Зберігаємо індекс одразу
                localStorage.setItem('caseyAppIndex', currentIndex + 1);
                
                // Змінюємо UI, щоб коли ти повернешся в додаток, тут була кнопка замість завантаження
                document.getElementById('content').innerHTML = `
                    <h2 style='color: #4CAF50;'>Відео відкрито!</h2>
                    <p style='color: #888; margin-bottom: 30px;'>Повертайся сюди за наступним.</p>
                    <button class="btn" onclick="playNextVideo()">▶ Наступне відео</button>
                `;

                // Примусово відкриваємо нативний додаток YouTube (схема youtube://)
                setTimeout(() => {
                    window.location.replace(`youtube://watch?v=${nextVideoId}`);
                }, 300);
            } else {
                document.getElementById('content').innerHTML = 
                    "<h2>Всі відео переглянуто!</h2>" + 
                    "<button class='btn' onclick='localStorage.removeItem(\"caseyAppIndex\"); window.location.reload();'>Почати спочатку</button>";
            }
        }

        // Автоматично запускаємо логіку при першому відкритті
        document.addEventListener("DOMContentLoaded", () => {
            try {
                playNextVideo();
            } catch (error) {
                document.getElementById('content').innerHTML = `<h2 style='color: red;'>Помилка: ${error.message}</h2>`;
            }
        });
    </script>
