<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій YouTube</title>
    <style>
        body {
            background-color: #ffffff; /* Білий фон */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* На всю висоту екрану */
            margin: 0;
        }
        
        .youtube-btn {
            transition: transform 0.2s ease-in-out;
            cursor: pointer;
        }

        .youtube-btn:hover {
            transform: scale(1.1) rotate(-2deg); /* Збільшення та легкий нахил при наведенні */
        }

        .hand-drawn {
            width: 150px;
            height: auto;
        }
    </style>
</head>
<body>

    <a href="https://m.youtube.com/channel/UChN1_4a8atyqkFcNIJx6MlA" target="_blank" class="youtube-btn">
        
        <svg class="hand-drawn" viewBox="0 0 100 70" xmlns="http://www.w3.org/2000/svg">
            <path d="M 8 15 Q 50 5 92 12 Q 98 35 90 60 Q 50 68 8 58 Q 2 35 8 15 Z" fill="#ff0000" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
            <path d="M 38 25 Q 40 35 38 45 Q 50 40 62 35 Q 50 30 38 25 Z" fill="#ffffff" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        
    </a>

</body>
</html>
