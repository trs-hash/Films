<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тарас Максимʼяк — кіноархів</title>
<style>
    /* Сучасний мінімалізм: системні шрифти (як на техніці Apple) */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px 20px 40px;
        color: #111;
        background-color: #fff;
    }

    h1 { 
        font-size: 1.8rem; 
        font-weight: 700;
        border-bottom: 1px solid #eaeaea; 
        padding-bottom: 15px; 
        margin-bottom: 30px;
    }

    h2 { 
        font-size: 1.4rem; 
        margin-top: 40px; 
        margin-bottom: 10px;
        font-weight: 600;
    }

    h3 { 
        font-size: 0.85rem; 
        color: #d93838; /* Елегантний червоний для сезону */
        text-transform: uppercase; 
        letter-spacing: 1.5px; 
        margin-top: 25px; 
        margin-bottom: 15px; 
        font-weight: 600;
    }

    .video-item { 
        margin-bottom: 30px; 
        cursor: pointer; 
        transition: opacity 0.2s;
    }
    
    .video-item:active {
        opacity: 0.7; /* Легка реакція на клік з телефона */
    }

    /* Велике та якісне прев'ю */
    .thumbnail { 
        width: 100%; 
        aspect-ratio: 16 / 9;
        object-fit: cover; 
        border-radius: 12px; /* Сучасні заокруглення */
        margin-bottom: 10px;
        background-color: #f5f5f5; /* Плейсхолдер поки вантажиться */
    }

    .info {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 0 4px;
    }

    .title { 
        font-size: 1.05rem; 
        font-weight: 500;
        line-height: 1.3;
    }

    .period { 
        color: #888; 
        font-size: 0.85rem; 
    }

    /* Відмітка переглянутого */
    .watched .thumbnail {
        opacity: 0.5;
        filter: grayscale(50%);
    }
    .watched .title { 
        text-decoration: line-through; 
        color: #888;
    }
    .watched .title::after { 
        content: " ❌"; 
        font-size: 0.9rem;
        text-decoration: none;
        display: inline-block;
    }
</style>
</head>
<body>

<h1>Кіноархів</h1>
<div id="catalog">Завантаження...</div>

<script>
const API_KEY = 'AIzaSyAM0jqex3ZEPCXGKweCZIs6-Z9NmLryTZ0'; 
const CHANNEL_ID = 'UChN1_4a8atyqkFcNIJx6MlA';
let videos = [];

async function fetchVideos() {
    try {
        const response = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=50&type=video`);
        const data = await response.json();
        
        if (data.items) {
            videos = data.items.map(item => ({
                id: item.id.videoId,
                title: item.snippet.title,
                date: item.snippet.publishedAt.split('T')[0], 
                // Використовуємо 'high' якість (480x360) замість 'medium', щоб не було мила
                thumbnail: item.snippet.thumbnails.high.url, 
                watched: false
            }));
            render();
        } else {
            document.getElementById('catalog').innerHTML = "<p>Відео не знайдено.</p>";
        }
    } catch (error) {
        document.getElementById('catalog').innerHTML = "<p>Помилка завантаження даних.</p>";
    }
}

function getSeason(date) {
    const month = date.getMonth() + 1;
    if (month >= 3 && month <= 5) return 'Весна';
    if (month >= 6 && month <= 8) return 'Літо';
    if (month >= 9 && month <= 11) return 'Осінь';
    return 'Зима';
}

function formatDate(date) {
    return `${String(date.getDate()).padStart(2,'0')}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getFullYear()).slice(-2)}`;
}

function render() {
    const catalog = document.getElementById('catalog');
    if (videos.length === 0) return;

    const sorted = [...videos].sort((a, b) => new Date(b.date) - new Date(a.date));
    let html = '';
    let currentYear = null, currentSeason = null;

    sorted.forEach((vid) => {
        const d = new Date(vid.date);
        const year = d.getFullYear();
        const season = getSeason(d);
        const dateStr = formatDate(d); // Тільки одна акуратна дата публікації

        if (year !== currentYear) {
            html += `<h2>${year}</h2>`;
            currentYear = year;
            currentSeason = null; 
        }
        if (season !== currentSeason) {
            html += `<h3>${season}</h3>`;
            currentSeason = season;
        }

        const watchedClass = vid.watched ? 'watched' : '';
        html += `
            <div class="video-item ${watchedClass}" onclick="toggleWatched('${vid.id}')">
                <img src="${vid.thumbnail}" alt="${vid.title}" class="thumbnail" loading="lazy">
                <div class="info">
                    <span class="title">${vid.title}</span>
                    <span class="period">${dateStr}</span>
                </div>
            </div>
        `;
    });
    catalog.innerHTML = html;
}

function toggleWatched(id) {
    const vid = videos.find(v => v.id === id);
    if (vid) vid.watched = !vid.watched;
    render();
}

fetchVideos();
</script>
</body>
</html>
