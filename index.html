<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кіноархів Тараса Максимʼяка</title>
    
    <meta property="og:title" content="Кіноархів Тараса Максимʼяка">
    <meta property="og:description" content="Один день — одне відео. Каталог мого щоденного кіночеленджу.">
    <meta property="og:image" content="image.png">
    <meta property="og:url" content="https://taras.kyiv.ua/">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌓</text></svg>">
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin>
    <link rel="dns-prefetch" href="https://i.ytimg.com">
    <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.googleapis.com">
    <style>
        :root{--bg-color:#fff;--text-color:#222;--cell-bg:#f8f8f8;--month-color:#888;--date-color:#ccc;--divider-color:#eaeaea;--nav-border:#ddd;--nav-glass:rgba(255,255,255,0.85);--thumb-bg:#e0e0e0}
        @media (prefers-color-scheme:dark){:root{--bg-color:#121212;--text-color:#e0e0e0;--cell-bg:#1e1e1e;--month-color:#aaa;--date-color:#555;--divider-color:#333;--nav-border:#444;--nav-glass:rgba(30,30,30,0.85);--thumb-bg:#2a2a2a}}
        
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg-color);color:var(--text-color);margin:0;padding:20px 20px 80px;overflow-x:hidden;scroll-behavior:smooth;transition:background .3s,color .3s}
        .main-wrapper{max-width:1400px;margin:0 auto;display:block}
        
        .year-header{font-size:48px;font-weight:800;margin:60px 0 10px;line-height:1;letter-spacing:-1px;border-bottom:3px solid var(--text-color);padding-bottom:10px;transition:border-color .3s}
        .year-header:first-child{margin-top:10px}
        
        .header-subinfo{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--month-color);font-weight:600;letter-spacing:2px;margin-top:-5px;margin-bottom:25px;text-transform:uppercase}
        .header-subinfo .dot-separator{font-size:10px;opacity:0.5}
        .insta-link{color:var(--month-color);text-decoration:none;transition:color .3s}
        .insta-link:hover{color:#e62117}
        
        .season-header{font-size:14px;font-weight:700;color:#e62117;text-transform:uppercase;letter-spacing:4px;margin:40px 0 15px}
        
        .month-wrapper{content-visibility:auto;contain-intrinsic-size:500px;margin-bottom:40px;scroll-margin-top:20px}
        .month-header{color:var(--month-color);font-size:22px;font-weight:500;text-transform:uppercase;margin:0 0 20px;letter-spacing:1px;transition:color .3s}
        
        .week-divider{grid-column:1/-1;height:1px;background:linear-gradient(90deg,transparent,var(--divider-color) 10%,var(--divider-color) 90%,transparent);margin:8px 0;transition:background .3s}
        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
        .day-cell{aspect-ratio:16/9;position:relative;background:var(--cell-bg);border-radius:6px;overflow:hidden;transform:translateZ(0);box-sizing:border-box;transition:background .3s}
        .day-cell.empty-day{background:transparent}
        
        .date-container{position:absolute;top:8px;left:10px;right:10px;display:flex;align-items:baseline;gap:6px;z-index:10;pointer-events:none}
        .date-num{font-size:18px;font-weight:800;line-height:1;color:var(--date-color);transition:color .3s}
        .day-name{font-size:10px;font-weight:500;text-transform:uppercase;color:var(--date-color);opacity:.6;transition:color .3s}
        .has-video .date-num,.has-video .day-name{color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9)}
        .has-video .day-name{opacity:.7;text-shadow:0 1px 2px rgba(0,0,0,.9)}

        .season-marker{background:#e62117!important;display:flex;align-items:center;justify-content:center;text-align:center;box-shadow:inset 0 0 20px rgba(0,0,0,0.1)}
        .season-marker-text{color:#fff;font-size:16px;font-weight:800;letter-spacing:6px;text-transform:uppercase;margin-left:6px}

        .videos-container{position:absolute;inset:0;display:flex;z-index:5}
        .video-link{position:relative;flex:1;height:100%;display:block;cursor:pointer;overflow:hidden;text-decoration:none}
        .videos-container.multiple .video-link:not(:last-child){border-right:2px solid #fff}
        
        .video-thumb{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;background-color:var(--thumb-bg)}
        .video-link:hover .video-thumb{transform:scale(1.03)}
        .video-link::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.6) 0%,transparent 30%,transparent 60%,rgba(0,0,0,.9) 100%);pointer-events:none}
        
        .overlay-title{position:absolute;bottom:10px;left:10px;right:10px;color:#fff;font-size:11px;font-weight:500;text-shadow:0 1px 2px #000;z-index:10;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.9}
        
        .video-link.watched .video-thumb{filter:none;opacity:.8}
        .video-link.watched::before,.video-link.watched::after{content:'';position:absolute;top:50%;left:50%;width:150%;height:3px;background:#e62117;z-index:20;pointer-events:none;box-shadow:0 0 5px rgba(0,0,0,.3)}
        .video-link.watched::before{transform:translate(-50%,-50%) rotate(45deg)}
        .video-link.watched::after{transform:translate(-50%,-50%) rotate(-45deg)}
        
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);opacity:0;transition:opacity .3s ease}
        .modal.show{display:flex;opacity:1}
        .modal-content{width:100%;max-width:1000px;padding:20px;position:relative;transition:transform .2s ease-out}
        .iframe-wrapper{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;background:#000;box-shadow:0 10px 30px rgba(0,0,0,.5)}
        .iframe-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
        .close-btn{position:absolute;top:-15px;right:20px;color:#fff;font-size:40px;cursor:pointer;line-height:1;z-index:10;text-shadow:0 2px 4px rgba(0,0,0,.5);font-weight:300}
        .close-btn:hover{color:#e62117}

        .floating-nav{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);background:var(--nav-glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:4px;display:flex;align-items:center;z-index:100;border:1px solid var(--nav-border);box-shadow:0 4px 15px rgba(0,0,0,0.05);transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;opacity:1}
        .floating-nav.hidden{transform:translate(-50%,100px);opacity:0}
        .month-select{appearance:none;-webkit-appearance:none;background:transparent;border:none;outline:none;padding:12px 35px 12px 20px;font-size:13px;font-weight:600;color:var(--text-color);cursor:pointer;font-family:inherit;text-align:center;text-transform:uppercase;letter-spacing:1px}
        .month-select option{background:var(--bg-color);color:var(--text-color);text-transform:none}
        .select-icon{position:absolute;right:15px;pointer-events:none;font-size:10px;color:var(--month-color)}

        @media (max-width:1024px){.calendar-grid{grid-template-columns:repeat(4,1fr)}}
        @media (max-width:600px){
            body{padding:15px 15px 70px}
            .calendar-grid{grid-template-columns:repeat(2,1fr);gap:6px}
            .year-header{font-size:38px}
            .date-num{font-size:16px}
            .day-name{font-size:9px}
            .modal-content{padding:10px}
            .close-btn{right:10px;top:-25px}
            .floating-nav{bottom:15px;width:auto;max-width:300px}
            .season-marker-text{font-size:14px;letter-spacing:4px}
        }
    </style>
</head>
<body>
<div class="main-wrapper" id="main"><div id="app"></div></div>

<div class="floating-nav" id="floatingNav">
    <select id="monthSelect" class="month-select" onchange="jumpTo(this.value)">
        <option value="" disabled selected>ОБРАТИ МІСЯЦЬ</option>
    </select>
    <span class="select-icon">▼</span>
</div>

<div id="videoModal" class="modal" onclick="closeModal()">
    <div class="modal-content" id="modalContent" onclick="event.stopPropagation()">
        <div class="close-btn" onclick="closeModal()">&times;</div>
        <div class="iframe-wrapper">
            <iframe id="ytIframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyBk_r3wrlYczHybeZtnPBID4zK_yv_XuHw';
    const UPLOADS_ID = 'UUhN1_4a8atyqkFcNIJx6MlA'; 
    const START_YEAR = 2026, START_MONTH = 2, START_DAY = 14; 
    const CACHE_KEY = 'yt_videos_data', CACHE_TIME_KEY = 'yt_videos_time', CACHE_TTL = 21600000; 
    
    const DOM = {
        app: document.getElementById('app'),
        monthSelect: document.getElementById('monthSelect'),
        nav: document.getElementById('floatingNav'),
        modal: document.getElementById('videoModal'),
        modalContent: document.getElementById('modalContent'),
        iframe: document.getElementById('ytIframe')
    };

    let videosMap = {};
    let watchedVideos = [];
    let lastScrollY = window.scrollY;
    
    // МАКСИМАЛЬНИЙ ЗАПОБІЖНИК №1: Безпечне читання пам'яті
    try { 
        var stored = localStorage.getItem('my_watched_videos');
        if (stored) watchedVideos = JSON.parse(stored);
    } catch (e) {
        watchedVideos = [];
    }
    
    window.addEventListener('scroll', function() {
        const currentScrollY = window.scrollY;
        if (currentScrollY > lastScrollY && currentScrollY > 150) DOM.nav.classList.add('hidden');
        else DOM.nav.classList.remove('hidden');
        lastScrollY = currentScrollY;
    }, { passive: true });

    async function init() {
        const now = Date.now();
        let cachedData = null;
        let cachedTime = null;

        // МАКСИМАЛЬНИЙ ЗАПОБІЖНИК №2: Блокування кешу в Safari
        try {
            cachedData = localStorage.getItem(CACHE_KEY);
            cachedTime = localStorage.getItem(CACHE_TIME_KEY);
        } catch (e) {
            cachedData = null;
            cachedTime = null;
        }

        if (cachedData && cachedTime && (now - parseInt(cachedTime, 10)) < CACHE_TTL) {
            try { 
                videosMap = JSON.parse(cachedData) || {}; 
                render(); 
                return; 
            } catch (e) {
                videosMap = {};
            }
        }

        try {
            let pageToken = '';
            videosMap = {}; 
            do {
                let url = 'https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=' + UPLOADS_ID + '&maxResults=50&key=' + API_KEY;
                if (pageToken) url += '&pageToken=' + pageToken;

                const res = await fetch(url);
                if (!res.ok) throw new Error('API Error'); // Якщо ліміт або мережа впала
                const data = await res.json();
                
                if (data && data.items) {
                    data.items.forEach(function(item) {
                        if (!item.snippet || !item.snippet.publishedAt || !item.snippet.resourceId) return;
                        
                        const dateKey = item.snippet.publishedAt.split('T')[0];
                        if (!videosMap[dateKey]) videosMap[dateKey] = [];
                        
                        const t = item.snippet.thumbnails || {};
                        // ЗАМІНЕНО ?., ЩОБ ПІДТРИМУВАТИ СТАРІ IPHONE ТА ВБУДОВАНІ БРАУЗЕРИ
                        const thumb = (t.maxres && t.maxres.url) || (t.standard && t.standard.url) || (t.high && t.high.url) || (t.medium && t.medium.url) || (t.default && t.default.url) || '';

                        videosMap[dateKey].push({ 
                            id: item.snippet.resourceId.videoId, 
                            title: item.snippet.title, 
                            thumb: thumb 
                        });
                    });
                }
                pageToken = data.nextPageToken;
            } while (pageToken);

            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify(videosMap));
                localStorage.setItem(CACHE_TIME_KEY, now.toString());
            } catch (e) {}

        } catch (e) {
            // МАКСИМАЛЬНИЙ ЗАПОБІЖНИК №3: Якщо впало все — підтягуємо що є, аби не було білого екрану
            if (cachedData) {
                try { videosMap = JSON.parse(cachedData) || {}; } catch (err) { videosMap = {}; }
            } else {
                videosMap = {};
            }
        }
        
        render();
    }

    function getSeason(m) {
        if (m === 11 || m <= 1) return "ЗИМА";
        if (m >= 2 && m <= 4) return "ВЕСНА";
        if (m >= 5 && m <= 7) return "ЛІТО";
        return "ОСІНЬ";
    }

    function render() {
        const today = new Date();
        let loop = new Date(START_YEAR, START_MONTH, 1);
        let curYear = 0, lastSeason = "";
        let html = '', navHtml = '<option value="" disabled selected>ОБРАТИ МІСЯЦЬ</option>';

        if (today < new Date(START_YEAR, START_MONTH, START_DAY)) {
            DOM.app.innerHTML = '<div style="text-align:center; padding: 40px; color:var(--month-color);">Календар розпочнеться 14 березня 2026 року.</div>';
            return;
        }

        let totalVideos = 0;
        if (videosMap) {
            for (const date in videosMap) {
                if (videosMap.hasOwnProperty(date) && videosMap[date]) {
                    totalVideos += videosMap[date].length;
                }
            }
        }

        while (loop <= today) {
            const y = loop.getFullYear(), m = loop.getMonth(), seas = getSeason(m);
            if (y !== curYear) { 
                html += `<h2 class="year-header">${y}</h2>`; 
                if (curYear === 0) {
                    html += `<div class="header-subinfo"><span>${totalVideos} / 365 ВІДЕО</span><span class="dot-separator">•</span><a href="https://instagram.com/taras.maksymiak/" target="_blank" class="insta-link">INSTAGRAM</a></div>`;
                }
                curYear = y; lastSeason = ""; 
            }
            if (seas !== lastSeason) { html += `<div class="season-header">${seas}</div>`; lastSeason = seas; }
            
            html += createMonthHTML(y, m);
            navHtml += `<option value="month-${y}-${m}">${monthsNames[m]} ${y}</option>`;
            loop.setMonth(m + 1);
        }
        
        DOM.app.innerHTML = html; 
        DOM.monthSelect.innerHTML = navHtml; 
    }

    function createMonthHTML(y, m) {
        let html = `<div class="month-wrapper" id="month-${y}-${m}"><div class="month-header">${monthsNames[m]}</div><div class="calendar-grid">`;
        let firstDay = (y === START_YEAR && m === START_MONTH) ? START_DAY : 1;
        let daysInMonth = new Date(y, m + 1, 0).getDate();
        let currentDow = new Date(y, m, firstDay).getDay();

        for (let d = firstDay; d <= daysInMonth; d++) {
            const dayName = weekDays[currentDow], isSunday = (currentDow === 0);
            currentDow = (currentDow + 1) % 7; 
            const key = y + '-' + (m+1).toString().padStart(2,'0') + '-' + d.toString().padStart(2,'0');
            const vids = videosMap ? videosMap[key] : null;
            const dateBlock = `<div class="date-container"><span class="date-num">${d}</span><span class="day-name">${dayName}</span></div>`;

            let cellClass = 'day-cell empty-day';

            if (y === 2026 && m === 2 && d === 16) {
                html += `<div class="day-cell season-marker"><div class="season-marker-text">СЕЗОН 1</div></div>`;
            } else if (vids && vids.length > 0) {
                cellClass = cellClass.replace('empty-day', 'has-video');
                let linksHTML = vids.map(function(vid) {
                    const watchedClass = watchedVideos.includes(vid.id) ? 'watched' : ''; 
                    return `<a href="https://www.youtube.com/watch?v=${vid.id}" class="video-link ${watchedClass}" onclick="openModal(event, '${vid.id}', this)"><img src="${vid.thumb}" class="video-thumb" loading="lazy" decoding="async" alt="${vid.title}"><div class="overlay-title">${vid.title}</div></a>`;
                }).join('');
                html += `<div class="${cellClass}"><div class="videos-container ${vids.length > 1 ? 'multiple' : ''}">${linksHTML}</div>${dateBlock}</div>`;
            } else {
                html += `<div class="${cellClass}">${dateBlock}</div>`;
            }

            if (isSunday && d !== daysInMonth) html += `<div class="week-divider"></div>`;
        }
        return html + `</div></div>`;
    }

    window.jumpTo = function(targetId) {
        if (!targetId) return;
        const el = document.getElementById(targetId);
        if (el) window.scrollTo({top: el.getBoundingClientRect().top + window.pageYOffset - 20, behavior: 'smooth'});
        DOM.monthSelect.selectedIndex = 0;
    }

    window.mark = function(id, el) {
        if (!watchedVideos.includes(id)) {
            watchedVideos.push(id);
            try { localStorage.setItem('my_watched_videos', JSON.stringify(watchedVideos)); } catch(e) {}
        }
        if(el) el.classList.add('watched');
    }

    window.openModal = function(e, id, el) {
        e.preventDefault();
        mark(id, el); 
        
        const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (isMobile) {
            const start = Date.now();
            let appUrl = /Android/i.test(navigator.userAgent) 
                ? 'intent://www.youtube.com/watch?v=' + id + '#Intent;package=com.google.android.youtube;scheme=https;end'
                : 'vnd.youtube://watch?v=' + id;

            window.location.href = appUrl;
            setTimeout(function() { if (Date.now() - start < 1500) showModal(id); }, 1000);
        } else {
            showModal(id);
        }
    }

    window.showModal = function(id) {
        DOM.iframe.src = 'https://www.youtube.com/embed/' + id + '?autoplay=1';
        DOM.modal.classList.add('show');
        document.body.style.overflow = 'hidden'; 
    }

    window.closeModal = function() {
        DOM.modalContent.style.transform = ''; 
        DOM.iframe.src = '';
        DOM.modal.classList.remove('show');
        document.body.style.overflow = 'auto'; 
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    let touchStartY = 0;
    DOM.modal.addEventListener('touchstart', function(e) { touchStartY = e.touches[0].clientY; }, {passive: true});
    DOM.modal.addEventListener('touchmove', function(e) {
        const deltaY = e.touches[0].clientY - touchStartY;
        if (deltaY > 0) DOM.modalContent.style.transform = `translateY(${deltaY}px)`;
    }, {passive: true});
    DOM.modal.addEventListener('touchend', function(e) {
        if (e.changedTouches[0].clientY - touchStartY > 100) closeModal();
        else DOM.modalContent.style.transform = 'translateY(0)';
    }, {passive: true});

    init();
</script>
</body>
</html>
