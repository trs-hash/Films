<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тарас Максимʼяк — кіноархів</title>
<style>
    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        max-width: 700px;
        margin: 0 auto;
        padding: 20px;
        color: #1a1a1a;
        line-height: 1.5;
    }
    h1 { font-size: 1.5rem; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
    h2 { font-size: 1.2rem; margin-top: 30px; }
    h3 { font-size: 1rem; color: #555; text-transform: uppercase; letter-spacing: 1px; }
    .video-item { margin-bottom: 15px; cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
    .video-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .period { color: #888; font-size: 0.85rem; }
    .title { transition: color 0.2s; font-size: 1rem; }
    .watched .title { text-decoration: line-through; }
    .watched .video-header::after { content: " ❌"; font-size: 0.9rem; }
</style>
</head>
<body>

<h1>Кіноархів</h1>
<div id="catalog">Завантаження відео...</div>

<script>
// Твій API-ключ та ID каналу
const API_KEY = 'AIzaSyAM0jqex3ZEPCXGKweCZIs6-Z9NmLryTZ0'; 
const CHANNEL_ID = 'UChN1_4a8atyqkFcNIJx6MlA';
let videos = [];

async function fetchVideos() {
    try {
        const response = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=50&type=video`);
        const data = await response.json();
        
        if (data.items) {
            videos = data.items.map(item => ({
                id: item.id.videoId,
                title: item.snippet.title,
                date: item.snippet.publishedAt.split('T')[0], 
                watched: false
            }));
            render();
        } else {
            document.getElementById('catalog').innerHTML = "<p>Відео не знайдено або перевищено ліміт запитів API.</p>";
        }
    } catch (error) {
        document.getElementById('catalog').innerHTML = "<p>Помилка завантаження даних.</p>";
    }
}

function getSeason(date) {
    const month = date.getMonth() + 1;
    if (month >= 3 && month <= 5) return 'Весна';
    if (month >= 6 && month <= 8) return 'Літо';
    if (month >= 9 && month <= 11) return 'Осінь';
    return 'Зима';
}

function formatDate(date) {
    return `${String(date.getDate()).padStart(2,'0')}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getFullYear()).slice(-2)}`;
}

function render() {
    const catalog = document.getElementById('catalog');
    if (videos.length === 0) {
        catalog.innerHTML = "<p>На каналі ще немає відео.</p>";
        return;
    }

    const sorted = [...videos].sort((a, b) => new Date(b.date) - new Date(a.date));
    let html = '';
    let currentYear = null, currentSeason = null;

    sorted.forEach((vid, i) => {
        const d = new Date(vid.date);
        const year = d.getFullYear();
        const season = getSeason(d);
        
        const prevVid = sorted[i + 1]; 
        const startDate = prevVid ? new Date(prevVid.date) : d;
        const period = `${formatDate(startDate)}-${formatDate(d)}`;

        if (year !== currentYear) {
            html += `<h2>${year}</h2>`;
            currentYear = year;
            currentSeason = null; 
        }
        if (season !== currentSeason) {
            html += `<h3>${season}</h3>`;
            currentSeason = season;
        }

        const watchedClass = vid.watched ? 'watched' : '';
        html += `
            <div class="video-item ${watchedClass}" onclick="toggleWatched('${vid.id}')">
                <div class="video-header">
                    <span class="title">${vid.title}</span>
                    <span class="period">(${period})</span>
                </div>
            </div>
        `;
    });
    catalog.innerHTML = html;
}

function toggleWatched(id) {
    const vid = videos.find(v => v.id === id);
    if (vid) vid.watched = !vid.watched;
    render();
}

fetchVideos();
</script>
</body>
</html>
