<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тарас Максимʼяк — кіноархів</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-color: #f7f7f9;
        --card-bg: #ffffff;
        --text-main: #111111;
        --text-muted: #666666;
        --shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        --shadow-hover: 0 16px 40px rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --bg-color: #0f0f11;
            --card-bg: #1a1a1c;
            --text-main: #f0f0f0;
            --text-muted: #888888;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 16px 40px rgba(0, 0, 0, 0.6);
        }
    }

    * { box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        padding: 40px 20px;
        line-height: 1.5;
        transition: background-color 0.3s, color 0.3s;
    }

    /* Органічна текстуризація (Film Grain) */
   .grain-overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        pointer-events: none; z-index: 9999;
        opacity: 0.04; mix-blend-mode: difference;
        background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
    }

   .container { max-width: 900px; margin: 0 auto; }

    h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 20px;
        letter-spacing: -1px;
    }

    /* Стилі для фільтрів */
   .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 40px; }
   .filter-btn {
        padding: 8px 18px; border: 1px solid var(--text-muted); border-radius: 30px;
        background: transparent; color: var(--text-main); cursor: pointer; 
        font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; transition: 0.2s;
    }
   .filter-btn.active { background: var(--text-main); color: var(--bg-color); border-color: var(--text-main); }

    /* Оптимізація рендерингу DOM */
   .year-section {
        content-visibility: auto;
        contain-intrinsic-size: 800px; 
        margin-bottom: 60px;
    }

   .year-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 2.5rem;
        margin: 0 0 20px 0;
        color: var(--text-main);
        opacity: 0.9;
        border-bottom: 1px solid var(--text-muted);
        padding-bottom: 10px;
    }

    /* Bento Сітка */
   .bento-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 24px;
    }

   .bento-card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 16px;
        box-shadow: var(--shadow);
        transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.4s ease;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

   .bento-card:hover {
        transform: translateY(-6px);
        box-shadow: var(--shadow-hover);
    }

   .thumb-wrapper {
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 10px;
        overflow: hidden;
        background-color: #333;
        position: relative;
    }

   .thumb {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        opacity: 0; 
    }

   .thumb.loaded { opacity: 1; transition: opacity 0.4s, transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
   .bento-card:hover.thumb { transform: scale(1.05); }

   .info { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; }
    
   .video-title {
        font-size: 1.05rem;
        font-weight: 500;
        line-height: 1.4;
        margin: 0;
    }

   .work-period {
        font-family: 'Space Grotesk', monospace;
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: auto;
    }

    /* Стан "Переглянуто" */
   .watched.thumb-wrapper::after {
        content: "❌";
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        background: rgba(0, 0, 0, 0.2);
        z-index: 2;
    }
   .watched.thumb { filter: grayscale(100%) opacity(0.5); }
   .watched.video-title { text-decoration: line-through; color: var(--text-muted); }

    /* Скелетон завантаження */
   .loading-pulse {
        text-align: center; color: var(--text-muted); font-family: 'Space Grotesk', sans-serif;
        padding: 40px; animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

</style>
</head>
<body>

<div class="grain-overlay"></div>

<div class="container">
    <h1>Кіноархів</h1>
    
    <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all')" id="btn-all">Усі</button>
        <button class="filter-btn" onclick="setFilter('unwatched')" id="btn-unwatched">Непереглянуті</button>
    </div>

    <div id="catalog"></div>
    <div id="loading" class="loading-pulse">Синхронізація архіву...</div>
</div>

<script>
const API_KEY = 'AIzaSyAM0jqex3ZEPCXGKweCZIs6-Z9NmLryTZ0'; 
const CHANNEL_ID = 'UChN1_4a8atyqkFcNIJx6MlA';
const UPLOADS_PLAYLIST_ID = CHANNEL_ID.replace('UC', 'UU'); 

let videos = JSON.parse(localStorage.getItem('cachedVideos')) ||;
let watchedIds = JSON.parse(localStorage.getItem('watchedVideos')) ||;
let activeFilter = 'all';

// Intersection Observer для лінивого завантаження зображень
const imageObserver = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const img = entry.target;
            if(img.dataset.src) {
                img.src = img.dataset.src;
                img.onload = () => img.classList.add('loaded');
            }
            observer.unobserve(img);
        }
    });
}, { rootMargin: '200px' }); 

function setFilter(filter) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`btn-${filter}`).classList.add('active');
    processAndRender();
}

async function fetchAllVideos(pageToken = '', isInit = true) {
    if (isInit && videos.length > 0) processAndRender();

    const loadingIndicator = document.getElementById('loading');
    if (pageToken |

| videos.length === 0) loadingIndicator.style.display = 'block';

    try {
        const pageQuery = pageToken? `&pageToken=${pageToken}` : '';
        const fields = 'nextPageToken,items(snippet(title,publishedAt,thumbnails,resourceId/videoId))';
        const response = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?key=${API_KEY}&playlistId=${UPLOADS_PLAYLIST_ID}&part=snippet&maxResults=50&fields=${fields}${pageQuery}`);
        const data = await response.json();
        
        if (data.items) {
            const fetchedVideos = data.items.map(item => {
                const thumbs = item.snippet.thumbnails;
                const bestThumbUrl = thumbs?.maxres?.url |

| thumbs?.standard?.url |
| thumbs?.high?.url |
| thumbs?.default?.url |
| '';
                return {
                    id: item.snippet.resourceId.videoId,
                    title: item.snippet.title,
                    date: item.snippet.publishedAt.split('T'), 
                    thumbnail: bestThumbUrl
                };
            });

            if (!pageToken) videos = fetchedVideos; 
            else videos = [...videos,...fetchedVideos]; 

            localStorage.setItem('cachedVideos', JSON.stringify(videos));

            if (data.nextPageToken) {
                await fetchAllVideos(data.nextPageToken, false);
            } else {
                processAndRender();
            }
        } else {
            processAndRender();
        }
    } catch (error) {
        if (videos.length === 0) document.getElementById('loading').innerText = "Помилка зв'язку з архівом.";
        console.error("API Error: ", error);
    }
}

function formatDate(date) {
    return `${String(date.getDate()).padStart(2,'0')}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getFullYear()).slice(-2)}`;
}

function processAndRender() {
    document.getElementById('loading').style.display = 'none';
    const catalog = document.getElementById('catalog');
    
    if (videos.length === 0) {
        catalog.innerHTML = "<p>Архів порожній.</p>";
        return;
    }

    // 1. Сортуємо глобально від старіших до новіших для розрахунку періоду
    videos.sort((a, b) => new Date(a.date) - new Date(b.date));
    
    videos.forEach((vid, i) => {
        const currentDate = new Date(vid.date);
        const prevDate = i > 0? new Date(videos[i - 1].date) : currentDate;
        vid.workPeriod = `${formatDate(prevDate)}-${formatDate(currentDate)}`;
        vid.year = currentDate.getFullYear();
        vid.watched = watchedIds.includes(vid.id);
    });

    // 2. Фільтрація (Усі / Непереглянуті)
    let displayVideos = videos;
    if (activeFilter === 'unwatched') {
        displayVideos = videos.filter(v =>!v.watched);
    }

    if (displayVideos.length === 0) {
        catalog.innerHTML = "<p style='color: var(--text-muted); margin-top: 20px;'>У цій категорії порожньо.</p>";
        return;
    }

    // 3. Реверсуємо назад (від новіших до старіших) для виводу
    displayVideos.sort((a, b) => new Date(b.date) - new Date(a.date));

    // Побудова DOM
    let html = '';
    let currentYear = null;

    displayVideos.forEach((vid) => {
        if (vid.year!== currentYear) {
            if (currentYear!== null) html += `</div></div>`; 
            
            html += `<div class="year-section">
                        <h2 class="year-title">${vid.year}</h2>
                        <div class="bento-grid">`;
            currentYear = vid.year;
        }

        const watchedClass = vid.watched? 'watched' : '';
        html += `
            <div class="bento-card ${watchedClass}" onclick="toggleWatched('${vid.id}', this)">
                <div class="thumb-wrapper">
                    <img data-src="${vid.thumbnail}" alt="" class="thumb">
                </div>
                <div class="info">
                    <h3 class="video-title">${vid.title}</h3>
                    <span class="work-period">${vid.workPeriod}</span>
                </div>
            </div>
        `;
    });
    
    if (currentYear!== null) html += `</div></div>`; 
    
    catalog.innerHTML = html;

    // Запуск спостерігача для лінивих зображень
    document.querySelectorAll('.thumb').forEach(img => imageObserver.observe(img));
}

// Перемикач стану
window.toggleWatched = function(id, cardElement) {
    const isWatched = cardElement.classList.toggle('watched');
    
    const vid = videos.find(v => v.id === id);
    if (vid) vid.watched = isWatched;

    if (isWatched) {
        if (!watchedIds.includes(id)) watchedIds.push(id);
    } else {
        watchedIds = watchedIds.filter(watchedId => watchedId!== id);
    }
    
    localStorage.setItem('watchedVideos', JSON.stringify(watchedIds));
    localStorage.setItem('cachedVideos', JSON.stringify(videos));

    if (activeFilter === 'unwatched' && isWatched) {
        cardElement.style.display = 'none';
    }
};

// Підключення Service Worker для роботи офлайн
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Registration failed: ', err));
    });
}

fetchAllVideos();
</script>
</body>
</html>
