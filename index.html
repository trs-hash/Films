<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тарас Максимʼяк — кіноархів</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌓</text></svg>">
    <style>
        /* --- СТИЛЬ "СТРІЧКА ПРЕМ'ЄР" --- */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #ffffff; 
            color: #111; 
            margin: 0; 
            padding: 40px 20px; 
            overflow-x: hidden; 
        }
        
       .main-wrapper { 
            max-width: 800px; /* Вузька колонка для зручного читання і перегляду */
            margin: 0 auto; 
            display: none; 
        }

        /* Шапка сайту */
       .site-header {
            text-align: center;
            margin-bottom: 60px;
            border-bottom: 1px solid #eee;
            padding-bottom: 30px;
        }
       .site-title {
            font-size: 24px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin: 0 0 15px 0;
            color: #000;
        }
       .intro-text {
            font-size: 15px;
            line-height: 1.6;
            color: #666;
            max-width: 600px;
            margin: 0 auto;
            font-weight: 300;
        }

        /* Список відео */
       .catalog-list {
            display: flex;
            flex-direction: column;
            gap: 60px;
            padding-bottom: 80px;
        }

        /* Картка одного тижня */
       .movie-card {
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Обкладинка */
       .cover-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #f4f4f4;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.4s;
            display: block;
        }
       .cover-wrapper:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
       .cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.4s ease;
        }

        /* Інформація під відео */
       .meta-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0 5px;
        }
       .title-block {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
       .week-badge {
            font-size: 11px;
            font-weight: 700;
            color: #e62117;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
       .movie-title {
            font-size: 28px;
            font-weight: 300;
            margin: 0;
            color: #111;
            line-height: 1.2;
            text-decoration: none;
        }
       .movie-date {
            font-size: 12px;
            color: #999;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: right;
            white-space: nowrap;
        }

        /* Стан: Переглянуто */
       .movie-card.watched.cover-image { filter: grayscale(100%); opacity: 0.7; }
       .movie-card.watched.movie-title { color: #999; }
       .movie-card.watched.week-badge { color: #bbb; }
        
       .watched-label {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.3s;
        }
       .movie-card.watched.watched-label { opacity: 1; }

        /* Стан: В процесі зйомки (Наступний тиждень) */
       .movie-card.future.cover-wrapper {
            background: #fafafa;
            border: 2px dashed #ddd;
            box-shadow: none;
            cursor: default;
        }
       .movie-card.future.cover-wrapper:hover { transform: none; }
       .placeholder-text {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #ccc; font-size: 14px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase;
        }
       .movie-card.future.movie-title { color: #ccc; font-style: italic; }

        #loading { text-align: center; color: #999; font-size: 12px; margin-top: 100px; letter-spacing: 2px; text-transform: uppercase; }

        @media (max-width: 600px) { 
            body { padding: 20px 15px; }
           .movie-title { font-size: 22px; }
           .site-title { font-size: 20px; }
           .intro-text { font-size: 14px; }
           .meta-container { flex-direction: column; gap: 10px; }
           .movie-date { text-align: left; }
        }
    </style>
</head>
<body>

<div id="loading">Завантаження архіву...</div>

<div class="main-wrapper" id="main">
    <header class="site-header">
        <h1 class="site-title">Тарас Максимʼяк</h1>
        <div class="intro-text">
            <p>Це мій особистий відеоархів. Я змінив правила гри: замість щоденного конвеєра я випускаю одне відео на тиждень. Більше часу на життя, більше сенсу в кадрах. Слідкуйте за новими епізодами.</p>
        </div>
    </header>

    <div id="catalog-container" class="catalog-list"></div>
</div>

<script>
    // --- КОНФІГУРАЦІЯ ---
    const API_KEY = 'AIzaSyC918RPw_8amuFXKD0ztETJMSjTHx4rUWc';
    const UPLOADS_ID = 'UUhN1_4a8atyqkFcNIJx6MlA'; 
    const START_DATE = new Date(2026, 1, 18); // 18 лютого 2026

    const container = document.getElementById('catalog-container');
    let watchedVideos =;
    try { watchedVideos = JSON.parse(localStorage.getItem('my_watched_videos') |

| ''); } catch (e) {}

    // --- ФОРМАТУВАННЯ ---
    function formatDate(dateString) {
        const d = new Date(dateString);
        const day = d.getDate().toString().padStart(2, '0');
        const month = (d.getMonth() + 1).toString().padStart(2, '0');
        const year = d.getFullYear();
        return `${day}.${month}.${year}`;
    }

    // --- ЗАВАНТАЖЕННЯ ДАНИХ ---
    async function init() {
        let globalVideos =;

        try {
            // Отримуємо всі відео плейлиста (один швидкий запит)
            const res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${UPLOADS_ID}&maxResults=50&key=${API_KEY}`);
            const data = await res.json();
            
            if (data.items && data.items.length > 0) {
                data.items.forEach(item => {
                    globalVideos.push({
                        id: item.snippet.resourceId.videoId,
                        title: item.snippet.title,
                        dateObj: new Date(item.snippet.publishedAt),
                        dateStr: item.snippet.publishedAt,
                        thumb: item.snippet.thumbnails.maxres?.url |

| item.snippet.thumbnails.medium?.url |
| ''
                    });
                });
            }
        } catch (e) {
            console.error("API Error", e);
        }

        // Рятувальний круг (якщо API пусте)
        if (globalVideos.length === 0) {
            globalVideos.push({
                id: "dQw4w9WgXcQ",
                title: "Початок",
                dateObj: START_DATE,
                dateStr: START_DATE.toISOString(),
                thumb: "https://picsum.photos/id/180/1280/720"
            });
        }

        processAndRender(globalVideos);
    }

    function processAndRender(videos) {
        // 1. Сортуємо від найстарішого до найновішого для нумерації тижнів
        videos.sort((a, b) => a.dateObj - b.dateObj);
        
        videos.forEach((video, index) => {
            video.weekNumber = index + 1;
        });

        // 2. Сортуємо назад (найновіші зверху)
        videos.sort((a, b) => b.dateObj - a.dateObj);

        let html = '';

        // 3. Блок "Наступний тиждень" (В процесі)
        const nextWeekNum = videos.length > 0? videos.weekNumber + 1 : 1;
        
        html += `
            <article class="movie-card future">
                <div class="cover-wrapper">
                    <div class="placeholder-text">У процесі зйомки</div>
                </div>
                <div class="meta-container">
                    <div class="title-block">
                        <span class="week-badge">Тиждень ${nextWeekNum}</span>
                        <h2 class="movie-title">Новий епізод...</h2>
                    </div>
                    <div class="movie-date">Скоро</div>
                </div>
            </article>
        `;

        // 4. Виводимо реальні відео
        videos.forEach(vid => {
            const isWatched = watchedVideos.includes(vid.id)? 'watched' : '';

            html += `
                <article class="movie-card ${isWatched}" id="card-${vid.id}">
                    <a href="https://www.youtube.com/watch?v=${vid.id}" target="_blank" class="cover-wrapper" onclick="markWatched('${vid.id}', event)">
                        <img src="${vid.thumb}" class="cover-image" loading="lazy" alt="${vid.title}">
                        <div class="watched-label">Переглянуто</div>
                    </a>
                    <div class="meta-container">
                        <div class="title-block">
                            <span class="week-badge">Тиждень ${vid.weekNumber}</span>
                            <a href="https://www.youtube.com/watch?v=${vid.id}" target="_blank" class="movie-title" onclick="markWatched('${vid.id}', event)">${vid.title}</a>
                        </div>
                        <div class="movie-date">${formatDate(vid.dateStr)}</div>
                    </div>
                </article>
            `;
        });

        container.innerHTML = html;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main').style.display = 'block';
    }

    // Збереження статусу перегляду
    window.markWatched = function(id, event) {
        if (!watchedVideos.includes(id)) {
            watchedVideos.push(id);
            localStorage.setItem('my_watched_videos', JSON.stringify(watchedVideos));
            const card = document.getElementById(`card-${id}`);
            if(card) card.classList.add('watched');
        }
    }

    init();
</script>
</body>
</html>
