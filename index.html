<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тарас Максимʼяк — кіноархів</title>
<link rel="preconnect" href="[https://fonts.googleapis.com](https://fonts.googleapis.com)">
<link rel="preconnect" href="[https://fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
<link href="[https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600;700&display=swap](https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600;700&display=swap)" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22[http://www.w3.org/2000/svg%22](http://www.w3.org/2000/svg%22) viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌓</text></svg>">
<style>
/* --- СТИЛЬ "RALEWAY SERIAL CLEAN" --- */
body {
font-family: 'Raleway', sans-serif;
background-color: #ffffff;
color: #111;
margin: 0;
padding: 40px;
overflow-x: hidden;
font-weight: 300;
}
.main-wrapper { max-width: 900px; margin: 0 auto; }
/* LIST & GRID */
.weeks-list { display: flex; flex-direction: column; gap: 50px; padding-bottom: 80px; min-height: 200px; }
.film-row {
display: grid; grid-template-columns: 1fr 1.6fr; gap: 40px; align-items: center;
opacity: 1;
}
/* SEPARATORS */
.separator-container { margin-top: 20px; margin-bottom: 10px; text-align: left; }
.year-separator { font-size: 60px; font-weight: 100; letter-spacing: 6px; line-height: 1; color: #000; display: block; }
.season-separator { font-size: 14px; font-weight: 500; letter-spacing: 4px; color: #e62117; text-transform: uppercase; display: block; margin-top: 10px; }
/* WATCHED STATE */
.film-row.watched { opacity: 0.5; }
.film-row.watched img { filter: grayscale(100%); transition: filter 0.5s ease; }
.film-row.watched.film-title { color: #bbb; text-decoration: none; }
.film-row.watched.episode-label { color: #ccc; }
.film-row.watched.watch-btn { border-color: #eee; color: #ccc; pointer-events: none; }
/* INFO (Align Left Update) /
.film-info {
text-align: left; / ТЕКСТ ЛІВОРУЧ /
display: flex;
flex-direction: column;
justify-content: center;
align-items: flex-start; / Елементи притиснуті вліво */
}
.episode-label {
font-size: 11px;
color: #e62117;
font-weight: 700;
letter-spacing: 2px;
text-transform: uppercase;
margin-bottom: 8px;
}
.week-range {
font-size: 10px;
color: #bbb;
font-weight: 600;
letter-spacing: 2px;
margin-bottom: 20px; /* Відступ до кнопки */
text-transform: uppercase;
}
.film-title {
font-size: 32px;
font-weight: 200;
line-height: 1.2;
margin: 0 0 10px 0;
color: #000;
text-decoration: none;
}
.watch-btn {
display: inline-block; font-size: 11px; font-weight: 600; text-decoration: none;
color: #e62117; border: 1px solid #e6e6e6; padding: 12px 30px;
border-radius: 50px;
align-self: flex-start; /* Кнопка теж зліва */
transition: all 0.3s;
text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
}
.watch-btn:hover { background: #e62117; color: white; border-color: #e62117; }
/* COVER */
.film-cover-link {
position: relative; width: 100%; aspect-ratio: 16/9; background: #f9f9f9;
overflow: hidden; border-radius: 2px; display: block; text-decoration: none;
transition: transform 0.5s ease;
}
.film-cover-link:hover { transform: scale(1.02); }
.film-thumb { width: 100%; height: 100%; object-fit: cover; }
#loading-msg { text-align: center; color: #ccc; font-size: 11px; margin-top: 50px; letter-spacing: 2px; font-weight: 500; }
@media (max-width: 900px) {
body { padding: 30px 20px; }
.film-row { grid-template-columns: 1fr; gap: 20px; margin-bottom: 50px; padding-bottom: 50px; border-bottom: 1px solid #fafafa; }
.film-info { text-align: left; order: 2; align-items: flex-start; }
.watch-btn { align-self: flex-start; }
.film-cover-link { order: 1; }
.year-separator { font-size: 40px; }
.separator-container { margin-top: 10px; }
}
</style>
</head>
<body>
<div class="main-wrapper">
<div id="weeks-container" class="weeks-list">
<div id="loading-msg">ЗАВАНТАЖЕННЯ АРХІВУ...</div>
</div>
</div>
<script>
// --- CONFIG ---
const API_KEY = 'AIzaSyC918RPw_8amuFXKD0ztETJMSjTHx4rUWc';
const CHANNEL_ID = 'UCn2Sn6RCn7n1ECIQJ7UrsHw';
const START_DATE = new Date(2026, 0, 11);
const container = document.getElementById('weeks-container');
const loadingMsg = document.getElementById('loading-msg');
let watchedVideos =;
try { watchedVideos = JSON.parse(localStorage.getItem('my_watched_videos') |
| ''); } catch (e) {}
// ДЕМО ДАНІ (Початковий стан, щоб сайт не був пустим при завантаженні)
let globalVideos =;
// --- UTILS ---
function formatDisplayDate(date) {
if (!date) return "";
const d = date.getDate().toString().padStart(2, '0');
const m = (date.getMonth() + 1).toString().padStart(2, '0');
const y = date.getFullYear().toString().slice(-2);
return ${d}.${m}.${y};
}
function getSeasonName(monthIndex) {
if (monthIndex === 11 |
| monthIndex <= 1) return "ЗИМА";
if (monthIndex >= 2 && monthIndex <= 4) return "ВЕСНА";
if (monthIndex >= 5 && monthIndex <= 7) return "ЛІТО";
return "ОСІНЬ";
}
// --- RENDER LOGIC ---
function renderTimeline(videos) {
let html = '';
if (!videos |
| videos.length === 0) {
container.innerHTML = '<div style="text-align:center; color:#999; margin-top:50px; font-size:12px;">Список порожній.</div>';
return;
}
let lastYear = null;
let lastSeason = null;
videos.forEach(obj => {
const date = obj.date;
const currentYear = date.getFullYear();
const currentSeason = getSeasonName(date.getMonth());
if (currentYear!== lastYear |
| currentSeason!== lastSeason) {
html += '<div class="separator-container">';
if (currentYear!== lastYear) {
html += <span class="year-separator">${currentYear}</span>;
lastYear = currentYear;
}
if (currentSeason!== lastSeason) {
html += <span class="season-separator">${currentSeason}</span>;
lastSeason = currentSeason;
}
html += '</div>';
}
const vid = obj.item;
const id = obj.id;
// БЕЗПЕЧНЕ ОТРИМАННЯ КАРТИНКИ (запобігає поломці сайту)
const t = vid?.snippet?.thumbnails;
const thumbUrl = t?.maxres?.url |
| t?.high?.url |
| t?.medium?.url |
| t?.default?.url |
| "https://via.placeholder.com/400x225?text=Video";
const isWatched = watchedVideos.includes(id)? 'watched' : '';
let wStart = new Date(date);
const day = wStart.getDay() |
| 7;
if (day!== 1) wStart.setHours(-24 * (day - 1));
let wEnd = new Date(wStart); wEnd.setDate(wStart.getDate() + 6);
html += `
<div class="film-row ${isWatched}" id="row-${id}">
<div class="film-info">
<div class="episode-label">Епізод {obj.episodeNumber}</div>
<a href="[https://www.youtube.com/watch?v=$](https://www.youtube.com/watch?v=$){id}" target="_blank" class="film-title">{vid.snippet.title}</a>
<div class="week-range">${formatDisplayDate(wStart)} — ${formatDisplayDate(wEnd)}</div>
<a href="[https://www.youtube.com/watch?v=$](https://www.youtube.com/watch?v=$){id}" target="_blank" class="watch-btn" onclick="toggleWatched('${id}')">
${isWatched? 'Переглянуто' : 'Дивитись фільм'}
</a>
</div>
<a href="[https://www.youtube.com/watch?v=$](https://www.youtube.com/watch?v=$){id}" target="_blank" class="film-cover-link" onclick="toggleWatched('${id}')">
<img src="${thumbUrl}" class="film-thumb" loading="lazy">
</a>
</div>`;
});
container.innerHTML = html;
if (loadingMsg) loadingMsg.style.display = 'none';
}
function processAndRender() {
// Сортуємо від старого до нового для нумерації епізодів
globalVideos.sort((a, b) => a.date - b.date);
globalVideos.forEach((video, index) => {
video.episodeNumber = index + 1;
});
// Сортуємо від нового до старого для відображення
globalVideos.sort((a, b) => b.date - a.date);
renderTimeline(globalVideos);
}
window.toggleWatched = function(id) {
if (!watchedVideos.includes(id)) {
watchedVideos.push(id);
localStorage.setItem('my_watched_videos', JSON.stringify(watchedVideos));
const row = document.getElementById(row-${id});
if(row) {
row.classList.add('watched');
const btn = row.querySelector('.watch-btn');
if(btn) btn.innerText = "Переглянуто";
}
}
}
// --- API FETCH ---
async function fetchRealData() {
try {
// Таймаут щоб сайт не чекав вічно
const controller = new AbortController();
const timeoutId = setTimeout(() => controller.abort(), 6000);
const channelRes = await fetch(https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}, { signal: controller.signal });
if (!channelRes.ok) throw new Error("API Blocked");
const channelData = await channelRes.json();
const uploadsId = channelData.items.contentDetails.relatedPlaylists.uploads;
const playlistRes = await fetch(https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=50&key=${API_KEY}, { signal: controller.signal });
const playlistData = await playlistRes.json();
clearTimeout(timeoutId);
if (playlistData.items && playlistData.items.length > 0) {
let validVideos =;
playlistData.items.forEach(item => {
validVideos.push({
date: new Date(item.snippet.publishedAt),
item: item,
id: item.snippet.resourceId.videoId
});
});
if (validVideos.length > 0) {
globalVideos = validVideos;
processAndRender();
}
}
} catch (err) {
console.warn("API Error, using demo mode", err);
if (loadingMsg) loadingMsg.style.display = 'none';
}
}
// --- ЗАПУСК ---
// Порядок важливий: спочатку оголошення функцій, потім виклик.
processAndRender(); // Малюємо базовий шаблон одразу
fetchRealData();    // Фоново вантажимо відео
</script>
</body>
</html>
