<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тарас Максимʼяк — 365</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌓</text></svg>">
    <link rel="preconnect" href="https://i.ytimg.com">
    <link rel="preconnect" href="https://www.googleapis.com">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #fff; color: #222; margin: 0; padding: 20px; overflow-x: hidden; }
        .main-wrapper { max-width: 1400px; margin: 0 auto; display: none; }
        
        .year-header { font-size: 40px; font-weight: 700; margin: 0 0 10px 0; line-height: 1; }
        .season-header { font-size: 14px; font-weight: 700; color: #e62117; text-transform: uppercase; letter-spacing: 2px; margin: 30px 0 10px; }
        .month-header { color: #555; font-size: 18px; font-weight: 600; text-transform: uppercase; margin: 15px 0; letter-spacing: 1px; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-cell { aspect-ratio: 16/9; position: relative; background: #f8f8f8; border-radius: 6px; overflow: hidden; }
        .day-cell.empty-day { background: transparent; } 

        .date-container { position: absolute; top: 8px; left: 10px; right: 10px; display: flex; align-items: baseline; gap: 6px; z-index: 10; pointer-events: none; }
        .date-num { font-size: 18px; font-weight: 800; line-height: 1; color: #ccc; }
        .day-name { font-size: 10px; font-weight: 500; text-transform: uppercase; color: #ccc; opacity: 0.6; }

        .has-video .date-num { color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.9); }
        .has-video .day-name { color: #fff; opacity: 0.7; text-shadow: 0 1px 2px rgba(0,0,0,0.9); }

        .videos-container { position: absolute; inset: 0; display: flex; z-index: 5; }
        .video-link { position: relative; flex: 1; height: 100%; display: block; cursor: pointer; overflow: hidden; text-decoration: none; }
        .videos-container.multiple .video-link:not(:last-child) { border-right: 2px solid #fff; }
        
        .video-thumb { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        .video-link:hover .video-thumb { transform: scale(1.03); }
        .video-link::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 30%, transparent 60%, rgba(0,0,0,0.9) 100%); pointer-events: none; }
        
        .overlay-title { position: absolute; bottom: 10px; left: 10px; right: 10px; color: #fff; font-size: 11px; font-weight: 500; text-shadow: 0 1px 2px #000; z-index: 10; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.9; }
        
        .video-link.watched .video-thumb { filter: none; opacity: 0.8; }
        .video-link.watched::before, .video-link.watched::after { content: ''; position: absolute; top: 50%; left: 50%; width: 150%; height: 3px; background: #e62117; z-index: 20; pointer-events: none; box-shadow: 0 0 5px rgba(0,0,0,0.3); }
        .video-link.watched::before { transform: translate(-50%, -50%) rotate(45deg); }
        .video-link.watched::after { transform: translate(-50%, -50%) rotate(-45deg); }

        @media (max-width: 1024px) { .calendar-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 600px) { 
            body { padding: 15px; } 
            .calendar-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; } 
            .year-header { font-size: 32px; }
            .date-num { font-size: 16px; }
            .day-name { font-size: 9px; }
        }
        #loading { font-size: 12px; color: #999; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>
<div id="loading">Завантаження...</div>
<div class="main-wrapper" id="main">
    <div id="app"></div>
</div>

<script>
    const API_KEY = 'AIzaSyC918RPw_8amuFXKD0ztETJMSjTHx4rUWc';
    const UPLOADS_ID = 'UUhN1_4a8atyqkFcNIJx6MlA'; 
    const START_YEAR = 2026;
    const START_MONTH = 2; // 2 = Березень
    const START_DAY = 11; 
    
    const CACHE_KEY = 'yt_videos_data';
    const CACHE_TIME_KEY = 'yt_videos_time';
    const CACHE_TTL = 6 * 60 * 60 * 1000; // 6 годин
    
    const app = document.getElementById('app');
    let videosMap = {};
    let watchedVideos = [];
    try { watchedVideos = JSON.parse(localStorage.getItem('my_watched_videos') || '[]'); } catch (e) {}

    const weekDays = ["НД", "ПН", "ВТ", "СР", "ЧТ", "ПТ", "СБ"];
    const monthsNames = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];

    async function init() {
        const now = Date.now();
        const cachedData = localStorage.getItem(CACHE_KEY);
        const cachedTime = localStorage.getItem(CACHE_TIME_KEY);

        if (cachedData && cachedTime && (now - parseInt(cachedTime)) < CACHE_TTL) {
            videosMap = JSON.parse(cachedData);
            showApp();
            return;
        }

        try {
            let pageToken = '';
            videosMap = {}; // Очищаємо перед новим завантаженням
            do {
                const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${UPLOADS_ID}&maxResults=50&key=${API_KEY}${pageToken ? \`&pageToken=\${pageToken}\` : ''}`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.items) {
                    data.items.forEach(item => {
                        const dateKey = item.snippet.publishedAt.split('T')[0];
                        if (!videosMap[dateKey]) videosMap[dateKey] = [];
                        
                        // Зберігаємо лише необхідне для швидкості та економії пам'яті
                        videosMap[dateKey].push({
                            id: item.snippet.resourceId.videoId,
                            title: item.snippet.title,
                            thumb: item.snippet.thumbnails?.maxres?.url || item.snippet.thumbnails?.high?.url || item.snippet.thumbnails?.medium?.url || ''
                        });
                    });
                }
                pageToken = data.nextPageToken;
            } while (pageToken);

            localStorage.setItem(CACHE_KEY, JSON.stringify(videosMap));
            localStorage.setItem(CACHE_TIME_KEY, now.toString());
        } catch (e) {
            console.error("Помилка завантаження даних:", e);
            if (cachedData) videosMap = JSON.parse(cachedData); // Фолбек на старий кеш при помилці
        }
        
        showApp();
    }

    function showApp() {
        render();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main').style.display = 'block';
    }

    function getSeason(m) {
        if (m === 11 || m <= 1) return "ЗИМА";
        if (m >= 2 && m <= 4) return "ВЕСНА";
        if (m >= 5 && m <= 7) return "ЛІТО";
        return "ОСІНЬ";
    }

    function render() {
        const today = new Date();
        let loop = new Date(START_YEAR, START_MONTH, 1);
        let curYear = 0, lastSeason = "";
        let finalHTML = ""; 

        while (loop <= today) {
            const y = loop.getFullYear();
            const m = loop.getMonth();
            const seas = getSeason(m);

            if (y !== curYear) {
                finalHTML += `<h2 class="year-header">${y}</h2>`;
                curYear = y;
                lastSeason = "";
            }
            if (seas !== lastSeason) {
                finalHTML += `<div class="season-header">${seas}</div>`;
                lastSeason = seas;
            }
            
            finalHTML += createMonthHTML(y, m);
            loop.setMonth(m + 1);
        }
        app.innerHTML = finalHTML; 
    }

    function createMonthHTML(y, m) {
        let monthHTML = `<div class="month-header">${monthsNames[m]}</div><div class="calendar-grid">`;
        let firstDay = (y === START_YEAR && m === START_MONTH) ? START_DAY : 1;
        let daysInMonth = new Date(y, m + 1, 0).getDate();
        
        let currentDow = new Date(y, m, firstDay).getDay();

        for (let d = firstDay; d <= daysInMonth; d++) {
            const dayName = weekDays[currentDow];
            currentDow = (currentDow + 1) % 7; 
            
            const key = `${y}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            const vids = videosMap[key];
            
            let cellClass = 'day-cell empty-day';
            const dateBlock = `<div class="date-container"><span class="date-num">${d}</span><span class="day-name">${dayName}</span></div>`;

            if (vids && vids.length > 0) {
                cellClass = cellClass.replace('empty-day', 'has-video');
                
                let linksHTML = vids.map(vid => {
                    const watchedClass = watchedVideos.includes(vid.id) ? 'watched' : '';
                    return `
                        <a href="https://www.youtube.com/watch?v=${vid.id}" target="_blank" class="video-link ${watchedClass}" onclick="mark('${vid.id}', this)">
                            <img src="${vid.thumb}" class="video-thumb" loading="lazy">
                            <div class="overlay-title">${vid.title}</div>
                        </a>
                    `;
                }).join('');

                monthHTML += `
                <div class="${cellClass}">
                    <div class="videos-container ${vids.length > 1 ? 'multiple' : ''}">
                        ${linksHTML}
                    </div>
                    ${dateBlock}
                </div>`;
            } else {
                monthHTML += `<div class="${cellClass}">${dateBlock}</div>`;
            }
        }
        monthHTML += `</div>`;
        return monthHTML;
    }

    window.mark = function(id, el) {
        if (!watchedVideos.includes(id)) {
            watchedVideos.push(id);
            localStorage.setItem('my_watched_videos', JSON.stringify(watchedVideos));
        }
        el.classList.add('watched');
    }

    init();
</script>
</body>
</html>
