<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тарас Максимʼяк — кіноархів</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-color: #f4f4f9; /* Світло-сірий фон сторінки, як стіна архіву */
        --card-bg: #ffffff;   /* Білий колір для карток */
        --text-color: #333;
        --accent-red: #d9534f; /* Червоний для сезонів */
        --typewriter-font: 'Courier New', Courier, monospace; /* Шрифт друкарської машинки */
    }

    body {
        font-family: 'Roboto Slab', serif; /* Більш класичний, "книжковий" шрифт */
        background-color: var(--bg-color);
        max-width: 800px; /* Трохи ширше для нового макету */
        margin: 0 auto;
        padding: 30px 20px;
        color: var(--text-color);
        line-height: 1.6;
    }

    h1 {
        font-size: 2rem;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 40px;
        font-weight: 700;
        border-bottom: 3px double #ccc; /* Подвійна лінія як у старих документах */
        padding-bottom: 15px;
    }

    h2 {
        font-family: var(--typewriter-font); /* Рік друкарським шрифтом */
        font-size: 1.8rem;
        margin-top: 40px;
        border-bottom: 1px dashed #ccc;
        padding-bottom: 5px;
    }

    h3 {
        color: var(--accent-red); /* Сезон червоним */
        font-size: 1.2rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 25px;
        margin-bottom: 15px;
        font-weight: bold;
    }

    /* Стиль картки відео */
    .video-card {
        background: var(--card-bg);
        border: 1px solid #e0e0e0;
        border-radius: 4px;
        padding: 15px;
        margin-bottom: 20px;
        box-shadow: 3px 3px 8px rgba(0,0,0,0.05); /* Легка тінь для об'єму */
        cursor: pointer;
        display: flex;
        justify-content: space-between; /* Розподіл по краях */
        align-items: flex-start;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .video-card:hover {
        transform: translateY(-2px);
        box-shadow: 4px 4px 12px rgba(0,0,0,0.1);
    }

    /* Ліва частина з текстом */
    .video-info {
        flex: 1; /* Займає весь доступний простір зліва */
        padding-right: 20px; /* Відступ від картинки */
        display: flex;
        flex-direction: column;
    }

    .title {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 8px;
        display: block;
    }

    .period {
        font-family: var(--typewriter-font); /* Дата друкарським шрифтом */
        color: #777;
        font-size: 0.9rem;
        background: #f9f9f9;
        padding: 2px 6px;
        border-radius: 3px;
        align-self: flex-start; /* Вирівнювання дати по лівому краю */
        border: 1px dotted #ccc;
    }

    /* Права частина з картинкою */
    .thumbnail {
        width: 160px; /* Фіксована ширина для великого прев'ю */
        height: 90px; /* Фіксована висота для формату 16:9 */
        object-fit: cover;
        border-radius: 3px;
        border: 2px solid #eee;
        flex-shrink: 0; /* Забороняє картинці стискатися */
    }

    /* Стилі для переглянутого відео */
    .watched {
        opacity: 0.7;
        background-color: #f0f0f0;
        border-color: #d0d0d0;
    }
    .watched .title {
        text-decoration: line-through;
    }
    .watched .video-info::after {
        content: "ПЕРЕГЛЯНУТО ❌";
        color: var(--accent-red);
        font-family: var(--typewriter-font);
        font-size: 0.8rem;
        margin-top: 10px;
        font-weight: bold;
    }

    /* Адаптивність для дуже малих екранів */
    @media (max-width: 480px) {
        .video-card {
            flex-direction: column-reverse; /* На мобільному картинка зверху */
        }
        .thumbnail {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            margin-bottom: 15px;
        }
        .video-info {
            padding-right: 0;
        }
    }
</style>
</head>
<body>

<h1>Кіноархів</h1>
<div id="catalog">Завантаження карток...</div>

<script>
const API_KEY = 'AIzaSyAM0jqex3ZEPCXGKweCZIs6-Z9NmLryTZ0'; 
const CHANNEL_ID = 'UChN1_4a8atyqkFcNIJx6MlA';
let videos = [];

async function fetchVideos() {
    try {
        // Використовуємо 'medium' thumbnail, вона досить велика для картки
        const response = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=50&type=video`);
        const data = await response.json();
        
        if (data.items) {
            videos = data.items.map(item => ({
                id: item.id.videoId,
                title: item.snippet.title,
                date: item.snippet.publishedAt.split('T')[0], 
                thumbnail: item.snippet.thumbnails.medium.url, 
                watched: false
            }));
            render();
        } else {
            document.getElementById('catalog').innerHTML = "<p>Відео не знайдено або перевищено ліміт запитів API.</p>";
        }
    } catch (error) {
        document.getElementById('catalog').innerHTML = "<p>Помилка зв'язку з архівом.</p>";
    }
}

function getSeason(date) {
    const month = date.getMonth() + 1;
    if (month >= 3 && month <= 5) return 'Весна';
    if (month >= 6 && month <= 8) return 'Літо';
    if (month >= 9 && month <= 11) return 'Осінь';
    return 'Зима';
}

function formatDate(date) {
    // Формат дати через крапки, як на печатці
    return `${String(date.getDate()).padStart(2,'0')}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getFullYear())}`;
}

function render() {
    const catalog = document.getElementById('catalog');
    if (videos.length === 0) {
        catalog.innerHTML = "<p>Архів порожній.</p>";
        return;
    }

    const sorted = [...videos].sort((a, b) => new Date(b.date) - new Date(a.date));
    let html = '';
    let currentYear = null, currentSeason = null;

    sorted.forEach((vid, i) => {
        const d = new Date(vid.date);
        const year = d.getFullYear();
        const season = getSeason(d);
        const dateStr = formatDate(d);

        if (year !== currentYear) {
            html += `<h2>Архівний рік: ${year}</h2>`;
            currentYear = year;
            currentSeason = null; 
        }
        if (season !== currentSeason) {
            html += `<h3>${season}</h3>`;
            currentSeason = season;
        }

        const watchedClass = vid.watched ? 'watched' : '';
        
        // Нова структура HTML для картки
        html += `
            <div class="video-card ${watchedClass}" onclick="toggleWatched('${vid.id}')">
                <div class="video-info">
                    <span class="title">${vid.title}</span>
                    <span class="period">Дата запису: ${dateStr}</span>
                </div>
                <img src="${vid.thumbnail}" alt="${vid.title}" class="thumbnail">
            </div>
        `;
    });
    catalog.innerHTML = html;
}

function toggleWatched(id) {
    const vid = videos.find(v => v.id === id);
    if (vid) vid.watched = !vid.watched;
    render();
}

fetchVideos();
</script>
</body>
</html>
