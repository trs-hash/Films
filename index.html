<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тарас Максимʼяк</title>
    
    <meta property="og:title" content="Taras Maksymiak">
    <meta property="og:image" content="image.png">
    <meta property="og:url" content="https://taras.kyiv.ua/">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌓</text></svg>">
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin>
    <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
    <style>
        :root{--bg:#fff;--txt:#222;--cell:#f8f8f8;--mut:#888;--div:#eaeaea;--red:#e62117}
        @media (prefers-color-scheme:dark){:root{--bg:#121212;--txt:#e0e0e0;--cell:#1e1e1e;--mut:#aaa;--div:#333}}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--txt);margin:0;padding:20px 20px 0;overflow-x:hidden;scroll-behavior:smooth}
        .wrap{max-width:1400px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
        .main{flex:1}
        
        h2{font-size:48px;font-weight:800;margin:60px 0 10px;line-height:1;letter-spacing:-1px}
        h2:first-child{margin-top:10px}
        
        .info{margin-bottom:25px}
        .info a{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--mut);font-weight:600;letter-spacing:2px;text-decoration:none;transition:.2s}
        .info a:hover{color:var(--red)}

        .nav-base{background:var(--cell);border-radius:8px;display:flex;border:1px solid var(--div);margin-bottom:40px;overflow:hidden}
        .nav-seg{flex:1;text-align:center;font-size:11px;font-weight:700;color:var(--mut);cursor:pointer;text-transform:uppercase;letter-spacing:1px;padding:12px 5px;transition:.2s;user-select:none;-webkit-tap-highlight-color:transparent}
        .nav-seg:hover{color:var(--red)}
        
        .mo-wrap{margin-bottom:40px;scroll-margin-top:20px}
        .mo-hdr{color:var(--mut);font-size:22px;font-weight:500;text-transform:uppercase;margin:0 0 20px;letter-spacing:1px}
        
        .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
        .cell{aspect-ratio:16/9;position:relative;background:var(--cell);border-radius:6px;overflow:hidden;transform:translateZ(0)}
        .cell.empty{background:transparent}
        
        .week-divider{grid-column:1/-1;height:2px;background:var(--div);border-radius:2px;margin:8px 0}
        
        .dt{position:absolute;top:8px;left:10px;display:flex;align-items:baseline;gap:6px;z-index:10;pointer-events:none}
        .dt-n{font-size:18px;font-weight:800;line-height:1;color:var(--date-color,#ccc)}
        .dt-d{font-size:10px;font-weight:500;text-transform:uppercase;color:var(--date-color,#ccc);opacity:.6}
        .has-vid .dt-n,.has-vid .dt-d{color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9)}
        .has-vid .dt-d{opacity:.7;text-shadow:0 1px 2px rgba(0,0,0,.9)}

        .v-cont{position:absolute;inset:0;display:flex;z-index:5}
        .v-lnk{position:relative;flex:1;height:100%;display:block;cursor:pointer;overflow:hidden;text-decoration:none}
        .v-cont.mult .v-lnk:not(:last-child){border-right:2px solid #fff}
        
        .v-thumb{width:100%;height:100%;object-fit:cover;transition:transform .4s;background:#e0e0e0}
        @media (prefers-color-scheme:dark){.v-thumb{background:#2a2a2a}}
        .v-lnk:hover .v-thumb{transform:scale(1.03)}
        .v-lnk::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.4) 0%,transparent 40%,rgba(0,0,0,.9) 100%);pointer-events:none}
        
        .v-title{position:absolute;bottom:10px;left:10px;right:10px;color:#fff;font-size:11px;font-weight:500;text-shadow:0 1px 2px #000;z-index:10;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        
        .v-lnk.watched .v-thumb{filter:grayscale(1) opacity(0.8)}
        .v-lnk.watched::before,.v-lnk.watched::after{content:'';position:absolute;top:50%;left:50%;width:150%;height:3px;background:var(--red);z-index:20;pointer-events:none;box-shadow:0 0 5px rgba(0,0,0,.3)}
        .v-lnk.watched::before{transform:translate(-50%,-50%) rotate(45deg)}
        .v-lnk.watched::after{transform:translate(-50%,-50%) rotate(-45deg)}
        
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;align-items:center;justify-content:center}
        .modal.show{display:flex}
        .mod-in{width:100%;max-width:1000px;padding:20px;position:relative;transition:transform .2s ease-out}
        .iframe-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;background:#000}
        .iframe-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
        .close{position:absolute;top:-15px;right:20px;color:#fff;font-size:40px;cursor:pointer;line-height:1;z-index:10}
        .close:hover{color:var(--red)}

        .footer{text-align:center;padding:60px 0;font-size:11px;color:var(--mut);letter-spacing:2px}

        @media(max-width:1024px){.grid{grid-template-columns:repeat(4,1fr)}}
        @media(max-width:600px){
            body{padding:15px 15px 0}
            .grid{grid-template-columns:repeat(2,1fr)}
            h2{font-size:38px}
            .dt-n{font-size:16px}
            .dt-d{font-size:9px}
            .mod-in{padding:10px}
            .close{right:10px;top:-25px}
            .nav-seg{font-size:9px;letter-spacing:0;padding:10px 2px}
            .footer{padding:50px 0}
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="main" id="app"></div>
    <div class="footer">© 2026 ТАРАС МАКСИМʼЯК</div>
</div>

<div id="vidModal" class="modal" onclick="closeModal()">
    <div class="mod-in" id="modIn" onclick="event.stopPropagation()">
        <div class="close" onclick="closeModal()">&times;</div>
        <div class="iframe-wrap"><iframe id="ytIframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyBk_r3wrlYczHybeZtnPBID4zK_yv_XuHw';
    const UPLOADS_ID = 'UUhN1_4a8atyqkFcNIJx6MlA'; 
    let videosMap = {};
    let watched = JSON.parse(localStorage.getItem('vw') || '[]');

    async function init() {
        let cached = localStorage.getItem('yt_data'), time = localStorage.getItem('yt_time'), now = Date.now();
        if (cached && time && (now - time) < 21600000) {
            videosMap = JSON.parse(cached);
            render();
        }
        await fetchAPI();
        localStorage.setItem('yt_data', JSON.stringify(videosMap));
        localStorage.setItem('yt_time', now);
        render();
    }

    async function fetchAPI(token = '') {
        try {
            let res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${UPLOADS_ID}&maxResults=50&key=${API_KEY}${token ? '&pageToken='+token : ''}`);
            let data = await res.json();
            (data.items || []).forEach(i => {
                let s = i.snippet;
                if (!s || !s.publishedAt) return;
                let date = s.publishedAt.split('T')[0];
                if (!videosMap[date]) videosMap[date] = [];
                let t = s.thumbnails || {};
                videosMap[date].push({ id: s.resourceId.videoId, title: s.title, thumb: (t.high || t.standard || t.default || {}).url || '' });
            });
            if (data.nextPageToken) await fetchAPI(data.nextPageToken);
        } catch(e) {}
    }

    function render() {
        let keys = Object.keys(videosMap).sort();
        let today = new Date();
        let startY = today.getFullYear(), startM = today.getMonth(), startD = today.getDate();

        // Автоматично беремо дату першого відео. Якщо його ще немає - залишаємо поточний день.
        if (keys.length > 0) {
            let p = keys[0].split('-');
            startY = parseInt(p[0], 10);
            startM = parseInt(p[1], 10) - 1;
            startD = parseInt(p[2], 10);
        }
        
        let html = '';
        let loop = new Date(startY, startM, 1);
        let curY = 0;
        let wDays = ["НД", "ПН", "ВТ", "СР", "ЧТ", "ПТ", "СБ"];
        let mNames = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];
        let abbr = ['СІЧ', 'ЛЮТ', 'БЕР', 'КВІ', 'ТРА', 'ЧЕР', 'ЛИП', 'СЕР', 'ВЕР', 'ЖОВ', 'ЛИС', 'ГРУ'];

        while (loop <= today) {
            let y = loop.getFullYear(), m = loop.getMonth();
            if (y !== curY) {
                html += `<h2>${y}</h2>`;
                if (curY === 0) {
                    html += `<div class="info"><a href="https://instagram.com/taras.maksymiak/" target="_blank"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>INSTAGRAM</a></div>`;
                    
                    let navHtml = '';
                    for(let i = 0; i <= 11; i++) {
                        // Показуємо в навігації лише місяці від старту і до сьогодні
                        if (y === startY && i < startM) continue;
                        if (y === today.getFullYear() && i > today.getMonth()) continue;
                        
                        navHtml += `<div class="nav-seg" onclick="document.getElementById('m-${y}-${i}').scrollIntoView({behavior:'smooth', block:'start'})">${abbr[i]}</div>`;
                    }
                    if (navHtml) html += `<div class="nav-base">${navHtml}</div>`;
                }
                curY = y;
            }
            
            html += `<div class="mo-wrap" id="m-${y}-${m}"><div class="mo-hdr">${mNames[m]}</div><div class="grid">`;
            
            let dMax = new Date(y, m + 1, 0).getDate();
            let dStartRender = (y === startY && m === startM) ? startD : 1;

            for (let d = dStartRender; d <= dMax; d++) {
                let dw = new Date(y, m, d).getDay();
                
                if (dw === 1 && d !== dStartRender) {
                    html += `<div class="week-divider"></div>`;
                }

                let key = `${y}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                let v = videosMap[key];
                
                let cCls = (v && v.length) ? 'cell has-vid' : 'cell empty';
                let cIn = '';

                if (v && v.length) {
                    v.forEach(vid => {
                        let wCls = watched.includes(vid.id) ? ' watched' : '';
                        cIn += `<a href="#" class="v-lnk${wCls}" onclick="openVid(event, '${vid.id}', this)"><img src="${vid.thumb}" class="v-thumb"><div class="v-title">${vid.title}</div></a>`;
                    });
                }
                html += `<div class="${cCls}"><div class="v-cont ${v && v.length>1?'mult':''}">${cIn}</div><div class="dt"><span class="dt-n">${d}</span><span class="dt-d">${wDays[dw]}</span></div></div>`;
            }
            html += `</div></div>`;
            loop.setMonth(m + 1);
        }
        document.getElementById('app').innerHTML = html;
    }

    window.openVid = function(e, id, el) {
        e.preventDefault();
        if (!watched.includes(id)) {
            watched.push(id);
            localStorage.setItem('vw', JSON.stringify(watched));
        }
        el.classList.add('watched');
        document.getElementById('ytIframe').src = 'https://www.youtube.com/embed/' + id + '?autoplay=1';
        document.getElementById('vidModal').classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    window.closeModal = function() {
        document.getElementById('ytIframe').src = '';
        document.getElementById('vidModal').classList.remove('show');
        document.body.style.overflow = 'auto';
        document.getElementById('modIn').style.transform = '';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    let tY = 0, mod = document.getElementById('vidModal'), mIn = document.getElementById('modIn');
    mod.addEventListener('touchstart', e => tY = e.touches[0].clientY, {passive:true});
    mod.addEventListener('touchmove', e => { let dY = e.touches[0].clientY - tY; if(dY>0) mIn.style.transform = `translateY(${dY}px)`; }, {passive:true});
    mod.addEventListener('touchend', e => { if(e.changedTouches[0].clientY - tY > 100) closeModal(); else mIn.style.transform = ''; }, {passive:true});

    setTimeout(init, 0);
</script>
</body>
</html>
