<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тарас Максимʼяк — кіноархів</title>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px 20px 40px;
        color: #111;
        background-color: #fff;
        transition: background-color 0.3s, color 0.3s;
    }

    h1 { font-size: 1.8rem; font-weight: 700; border-bottom: 1px solid #eaeaea; padding-bottom: 15px; margin-bottom: 20px; }
    h2 { font-size: 1.4rem; margin-top: 40px; margin-bottom: 10px; font-weight: 600; }
    h3 { font-size: 0.85rem; color: #d93838; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 25px; margin-bottom: 15px; font-weight: 600; }

    /* Стилі для фільтрів */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 30px; }
    .filter-btn {
        padding: 6px 12px; border: 1px solid #ccc; border-radius: 20px;
        background: transparent; cursor: pointer; font-size: 0.9rem; transition: 0.2s;
    }
    .filter-btn.active { background: #111; color: #fff; border-color: #111; }

    .video-item { margin-bottom: 30px; cursor: pointer; transition: opacity 0.2s; }
    .video-item:active { opacity: 0.7; }

    .thumbnail { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 12px; margin-bottom: 10px; background-color: #f5f5f5; }
    .info { display: flex; flex-direction: column; gap: 4px; padding: 0 4px; }
    .title { font-size: 1.05rem; font-weight: 500; line-height: 1.3; }
    .period { color: #888; font-size: 0.85rem; }

    .watched .thumbnail { opacity: 0.5; filter: grayscale(50%); }
    .watched .title { text-decoration: line-through; color: #888; }
    .watched .title::after { content: " ❌"; font-size: 0.9rem; text-decoration: none; display: inline-block; }

    #loading-indicator { display: none; text-align: center; color: #888; font-size: 0.9rem; padding: 20px; }

    @media (prefers-color-scheme: dark) {
        body { background-color: #121212; color: #e0e0e0; }
        h1 { border-bottom: 1px solid #333; }
        h3 { color: #ff5c5c; }
        .period { color: #aaa; }
        .thumbnail { background-color: #2a2a2a; }
        .watched .title { color: #555; }
        .filter-btn { border-color: #444; color: #e0e0e0; }
        .filter-btn.active { background: #e0e0e0; color: #111; border-color: #e0e0e0; }
    }
</style>
</head>
<body>

<h1>Кіноархів</h1>

<div class="filters">
    <button class="filter-btn active" onclick="setFilter('all')" id="btn-all">Усі</button>
    <button class="filter-btn" onclick="setFilter('unwatched')" id="btn-unwatched">Непереглянуті</button>
    <button class="filter-btn" onclick="setFilter('Весна')" id="btn-Весна">Весна</button>
    <button class="filter-btn" onclick="setFilter('Літо')" id="btn-Літо">Літо</button>
    <button class="filter-btn" onclick="setFilter('Осінь')" id="btn-Осінь">Осінь</button>
    <button class="filter-btn" onclick="setFilter('Зима')" id="btn-Зима">Зима</button>
</div>

<div id="catalog"></div>
<div id="loading-indicator">Завантаження...</div>

<script>
const API_KEY = 'AIzaSyAM0jqex3ZEPCXGKweCZIs6-Z9NmLryTZ0'; 
const CHANNEL_ID = 'UChN1_4a8atyqkFcNIJx6MlA';
const UPLOADS_PLAYLIST_ID = CHANNEL_ID.replace('UC', 'UU'); 

let videos = JSON.parse(localStorage.getItem('cachedVideos')) || []; // Кеш для миттєвого відображення
let watchedIds = JSON.parse(localStorage.getItem('watchedVideos')) || [];
let activeFilter = 'all';

function setFilter(filter) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`btn-${filter}`).classList.add('active');
    render();
}

async function fetchVideos(pageToken = '', isInit = true) {
    if (isInit && videos.length > 0) render(); // Показуємо кеш миттєво
    
    const loadingIndicator = document.getElementById('loading-indicator');
    if (pageToken || videos.length === 0) loadingIndicator.style.display = 'block';

    try {
        const pageQuery = pageToken ? `&pageToken=${pageToken}` : '';
        const response = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?key=${API_KEY}&playlistId=${UPLOADS_PLAYLIST_ID}&part=snippet&maxResults=50${pageQuery}`);
        const data = await response.json();
        
        if (data.items) {
            const fetchedVideos = data.items.map(item => {
                const thumbs = item.snippet.thumbnails;
                const bestThumbUrl = thumbs?.maxres?.url || thumbs?.standard?.url || thumbs?.high?.url || thumbs?.default?.url || '';
                return {
                    id: item.snippet.resourceId.videoId,
                    title: item.snippet.title,
                    date: item.snippet.publishedAt.split('T')[0], 
                    thumbnail: bestThumbUrl,
                    watched: watchedIds.includes(item.snippet.resourceId.videoId)
                };
            });

            if (!pageToken) videos = fetchedVideos; // Оновлюємо базу новими даними
            else videos = [...videos, ...fetchedVideos]; // Додаємо наступні сторінки

            localStorage.setItem('cachedVideos', JSON.stringify(videos)); // Зберігаємо в кеш
            render();

            if (data.nextPageToken) {
                await fetchVideos(data.nextPageToken, false);
            } else {
                loadingIndicator.style.display = 'none';
            }
        }
    } catch (error) {
        loadingIndicator.style.display = 'none';
    }
}

function getSeason(date) {
    const month = date.getMonth() + 1;
    if (month >= 3 && month <= 5) return 'Весна';
    if (month >= 6 && month <= 8) return 'Літо';
    if (month >= 9 && month <= 11) return 'Осінь';
    return 'Зима';
}

function formatDate(date) {
    return `${String(date.getDate()).padStart(2,'0')}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getFullYear()).slice(-2)}`;
}

function render() {
    const catalog = document.getElementById('catalog');
    
    // Фільтрація
    let displayVideos = videos;
    if (activeFilter === 'unwatched') {
        displayVideos = videos.filter(v => !v.watched);
    } else if (activeFilter !== 'all') {
        displayVideos = videos.filter(v => getSeason(new Date(v.date)) === activeFilter);
    }

    if (displayVideos.length === 0) {
        catalog.innerHTML = "<p style='color:#888;'>У цій категорії порожньо.</p>";
        return;
    }

    const sorted = [...displayVideos].sort((a, b) => new Date(b.date) - new Date(a.date));
    let html = '';
    let currentYear = null, currentSeason = null;

    sorted.forEach((vid) => {
        const d = new Date(vid.date);
        const year = d.getFullYear();
        const season = getSeason(d);
        const dateStr = formatDate(d);

        // Відображаємо заголовки років і сезонів тільки для фільтру "Усі" та "Непереглянуті"
        if (activeFilter === 'all' || activeFilter === 'unwatched') {
            if (year !== currentYear) { html += `<h2>${year}</h2>`; currentYear = year; currentSeason = null; }
            if (season !== currentSeason) { html += `<h3>${season}</h3>`; currentSeason = season; }
        }

        const watchedClass = vid.watched ? 'watched' : '';
        html += `
            <div class="video-item ${watchedClass}" onclick="toggleWatched('${vid.id}')">
                <img src="${vid.thumbnail}" alt="${vid.title}" class="thumbnail" loading="lazy">
                <div class="info">
                    <span class="title">${vid.title}</span>
                    <span class="period">${dateStr}</span>
                </div>
            </div>
        `;
    });
    catalog.innerHTML = html;
}

function toggleWatched(id) {
    const vid = videos.find(v => v.id === id);
    if (vid) {
        vid.watched = !vid.watched;
        if (vid.watched) watchedIds.push(id);
        else watchedIds = watchedIds.filter(watchedId => watchedId !== id);
        
        localStorage.setItem('watchedVideos', JSON.stringify(watchedIds));
        localStorage.setItem('cachedVideos', JSON.stringify(videos));
    }
    render();
}

// Реєстрація Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Registration failed: ', err));
    });
}

fetchVideos();
</script>
</body>
</html>
