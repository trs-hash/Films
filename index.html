<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тарас Максимʼяк — 365</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌓</text></svg>">
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin>
    <link rel="dns-prefetch" href="https://i.ytimg.com">
    <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.googleapis.com">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #fff; color: #222; margin: 0; padding: 20px; overflow-x: hidden; }
        .main-wrapper { max-width: 1400px; margin: 0 auto; display: none; }
        
        .year-header { font-size: 40px; font-weight: 700; margin: 0 0 10px 0; line-height: 1; }
        .season-header { font-size: 14px; font-weight: 700; color: #e62117; text-transform: uppercase; letter-spacing: 2px; margin: 30px 0 10px; }
        
        .month-wrapper { content-visibility: auto; contain-intrinsic-size: 500px; margin-bottom: 20px; }
        .month-header { color: #555; font-size: 18px; font-weight: 600; text-transform: uppercase; margin: 0 0 15px 0; letter-spacing: 1px; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-cell { aspect-ratio: 16/9; position: relative; background: #f8f8f8; border-radius: 6px; overflow: hidden; transform: translateZ(0); box-sizing: border-box; } 
        .day-cell.empty-day { background: transparent; } 
        
        .day-cell.today { border: 2px solid #e62117; box-shadow: 0 4px 12px rgba(230, 33, 23, 0.15); }
        .today-indicator { position: absolute; top: 12px; right: 12px; width: 8px; height: 8px; background-color: #e62117; border-radius: 50%; z-index: 20; animation: pulse 2s infinite; pointer-events: none; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(230, 33, 23, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(230, 33, 23, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(230, 33, 23, 0); }
        }

        .date-container { position: absolute; top: 8px; left: 10px; right: 10px; display: flex; align-items: baseline; gap: 6px; z-index: 10; pointer-events: none; }
        .date-num { font-size: 18px; font-weight: 800; line-height: 1; color: #ccc; }
        .day-name { font-size: 10px; font-weight: 500; text-transform: uppercase; color: #ccc; opacity: 0.6; }

        .has-video .date-num { color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.9); }
        .has-video .day-name { color: #fff; opacity: 0.7; text-shadow: 0 1px 2px rgba(0,0,0,0.9); }

        .videos-container { position: absolute; inset: 0; display: flex; z-index: 5; }
        .video-link { position: relative; flex: 1; height: 100%; display: block; cursor: pointer; overflow: hidden; text-decoration: none; }
        .videos-container.multiple .video-link:not(:last-child) { border-right: 2px solid #fff; }
        
        .video-thumb { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; background-color: #e0e0e0; }
        .video-link:hover .video-thumb { transform: scale(1.03); }
        .video-link::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 30%, transparent 60%, rgba(0,0,0,0.9) 100%); pointer-events: none; }
        
        .overlay-title { position: absolute; bottom: 10px; left: 10px; right: 10px; color: #fff; font-size: 11px; font-weight: 500; text-shadow: 0 1px 2px #000; z-index: 10; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.9; }
        
        .video-link.watched .video-thumb { filter: none; opacity: 0.8; }
        .video-link.watched::before, .video-link.watched::after { content: ''; position: absolute; top: 50%; left: 50%; width: 150%; height: 3px; background: #e62117; z-index: 20; pointer-events: none; box-shadow: 0 0 5px rgba(0,0,0,0.3); }
        .video-link.watched::before { transform: translate(-50%, -50%) rotate(45deg); }
        .video-link.watched::after { transform: translate(-50%, -50%) rotate(-45deg); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.3s ease; }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { width: 100%; max-width: 1000px; padding: 20px; position: relative; }
        .iframe-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .iframe-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .close-btn { position: absolute; top: -15px; right: 20px; color: #fff; font-size: 40px; cursor: pointer; line-height: 1; z-index: 10; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-weight: 300; }
        .close-btn:hover { color: #e62117; }

        @media (max-width: 1024px) { .calendar-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 600px) { 
            body { padding: 15px; } 
            .calendar-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; } 
            .year-header { font-size: 32px; }
            .date-num { font-size: 16px; }
            .day-name { font-size: 9px; }
            .modal-content { padding: 10px; }
            .close-btn { right: 10px; top: -25px; }
        }
        #loading { font-size: 12px; color: #999; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>
<div id="loading">Завантаження...</div>
<div class="main-wrapper" id="main">
    <div id="app"></div>
</div>

<div id="videoModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="close-btn" onclick="closeModal()">&times;</div>
        <div class="iframe-wrapper">
            <iframe id="ytIframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyC918RPw_8amuFXKD0ztETJMSjTHx4rUWc';
    const CHANNEL_ID = 'UChN1_4a8atyqkFcNIJx6MlA'; 
    const UPLOADS_ID = CHANNEL_ID.replace(/^UC/, 'UU');

    const START_YEAR = 2026;
    const START_MONTH = 2; // Березень
    const START_DAY = 12; 
    
    const CACHE_KEY = 'yt_videos_data';
    const CACHE_TIME_KEY = 'yt_videos_time';
    const CACHE_TTL = 6 * 60 * 60 * 1000; 
    
    const app = document.getElementById('app');
    let videosMap = {};
    let watchedVideos = [];
    
    try { 
        watchedVideos = JSON.parse(localStorage.getItem('my_watched_videos') || '[]'); 
    } catch (e) {}

    const weekDays = ["НД", "ПН", "ВТ", "СР", "ЧТ", "ПТ", "СБ"];
    const monthsNames = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];

    async function init() {
        const now = Date.now();
        let cachedData = null, cachedTime = null;

        try {
            cachedData = localStorage.getItem(CACHE_KEY);
            cachedTime = localStorage.getItem(CACHE_TIME_KEY);
        } catch (e) {}

        if (cachedData && cachedTime && (now - parseInt(cachedTime)) < CACHE_TTL) {
            try {
                videosMap = JSON.parse(cachedData);
                showApp();
                return;
            } catch (e) {}
        }

        try {
            let pageToken = '';
            videosMap = {}; 
            do {
                let url = 'https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=' + UPLOADS_ID + '&maxResults=50&key=' + API_KEY;
                if (pageToken) url += '&pageToken=' + pageToken;

                const res = await fetch(url);
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error((data.error && data.error.message) || 'Код помилки: ' + res.status);
                }
                
                if (data.items && data.items.length > 0) {
                    data.items.forEach(function(item) {
                        if (!item.snippet || !item.snippet.publishedAt) return;

                        const dateKey = item.snippet.publishedAt.split('T')[0];
                        if (!videosMap[dateKey]) videosMap[dateKey] = [];
                        
                        const t = item.snippet.thumbnails || {};
                        const thumb = (t.maxres && t.maxres.url) || 
                                      (t.standard && t.standard.url) || 
                                      (t.high && t.high.url) || 
                                      (t.medium && t.medium.url) || 
                                      (t.default && t.default.url) || '';

                        videosMap[dateKey].push({
                            id: item.snippet.resourceId.videoId,
                            title: item.snippet.title,
                            thumb: thumb
                        });
                    });
                }
                pageToken = data.nextPageToken;
            } while (pageToken);

            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify(videosMap));
                localStorage.setItem(CACHE_TIME_KEY, now.toString());
            } catch (e) {}

            showApp();

        } catch (e) {
            console.error(e);
            if (cachedData) {
                try { videosMap = JSON.parse(cachedData); showApp(); } catch (err) {}
            } else {
                document.getElementById('loading').innerHTML = `
                    <div style="color: #e62117; font-size: 16px; padding: 30px;">
                        Не вдалося підключитися до YouTube.<br>
                        Деталі помилки: ${e.message}
                    </div>`;
            }
        }
    }

    function showApp() {
        try {
            render();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main').style.display = 'block';
        } catch (e) {
            document.getElementById('loading').innerHTML = '<div style="color: red;">Помилка побудови календаря: ' + e.message + '</div>';
        }
    }

    function getSeason(m) {
        if (m === 11 || m <= 1) return "ЗИМА";
        if (m >= 2 && m <= 4) return "ВЕСНА";
        if (m >= 5 && m <= 7) return "ЛІТО";
        return "ОСІНЬ";
    }

    function render() {
        const today = new Date();
        let loop = new Date(START_YEAR, START_MONTH, 1);
        let curYear = 0, lastSeason = "";

        if (today < new Date(START_YEAR, START_MONTH, START_DAY)) {
            app.innerHTML = '<div style="text-align:center; padding: 40px; color:#999;">Календар розпочнеться 12 березня 2026 року.</div>';
            return;
        }

        let htmlChunks = [];

        while (loop <= today) {
            const y = loop.getFullYear();
            const m = loop.getMonth();
            const seas = getSeason(m);

            if (y !== curYear) {
                htmlChunks.push('<h2 class="year-header">' + y + '</h2>');
                curYear = y;
                lastSeason = "";
            }
            if (seas !== lastSeason) {
                htmlChunks.push('<div class="season-header">' + seas + '</div>');
                lastSeason = seas;
            }
            
            htmlChunks.push(createMonthHTML(y, m));
