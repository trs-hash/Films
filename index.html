<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кіноархів</title>
    
    <meta property="og:title" content="Кіноархів">
    <meta property="og:description" content="Лови День. Особистий відеоархів.">
    <meta property="og:image" content="image.png">
    <meta property="og:url" content="https://taras.kyiv.ua/">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌓</text></svg>">
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin>
    <link rel="dns-prefetch" href="https://i.ytimg.com">
    <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.googleapis.com">
    <style>
        :root{--bg-color:#fff;--text-color:#222;--month-color:#888;--date-color:#ccc;--divider-color:#eaeaea;--thumb-bg:#e0e0e0;--accent-red:#e62117}
        @media (prefers-color-scheme:dark){:root{--bg-color:#121212;--text-color:#e0e0e0;--month-color:#aaa;--date-color:#555;--divider-color:#333;--thumb-bg:#2a2a2a;--accent-red:#e62117}}
        
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg-color);color:var(--text-color);margin:0;padding:20px 20px 0px;overflow-x:hidden;scroll-behavior:smooth;transition:background .3s,color .3s}
        .main-wrapper{max-width:1200px;margin:0 auto;display:block;min-height:100vh;display:flex;flex-direction:column}
        .content-flex{flex:1}
        
        .header-top { margin: 60px 0 40px; border-bottom: 1px solid var(--divider-color); padding-bottom: 20px; }
        .site-title { font-size: 48px; font-weight: 800; margin: 0 0 10px; line-height: 1; letter-spacing: -1px; }
        
        .header-subinfo { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--month-color); font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
        .header-subinfo .dot-separator { font-size: 10px; opacity: 0.5; }
        .insta-link { color: var(--month-color); text-decoration: none; transition: color .3s; display: flex; align-items: center; gap: 5px; }
        .insta-link svg { margin-bottom: 2px; }
        .insta-link:hover { color: var(--accent-red); }

        .year-section { margin-bottom: 60px; }
        .year-title { font-size: 32px; font-weight: 800; margin: 0 0 30px; color: var(--text-color); }
        
        .month-section { margin-bottom: 40px; }
        .month-title { color: var(--month-color); font-size: 18px; font-weight: 600; text-transform: uppercase; margin: 0 0 20px; letter-spacing: 2px; }

        /* Нова сітка-галерея для відео */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .video-card { aspect-ratio: 16/9; position: relative; background: var(--thumb-bg); border-radius: 8px; overflow: hidden; cursor: pointer; text-decoration: none; transform: translateZ(0); }
        .video-thumb { width: 100%; height: 100%; object-fit: cover; transition: transform .4s ease; will-change: transform; }
        .video-card:hover .video-thumb { transform: scale(1.03); }
        .video-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,.4) 0%, transparent 30%, transparent 60%, rgba(0,0,0,.9) 100%); pointer-events: none; }
        
        /* Значок дати на відео */
        .date-badge { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: 1px; z-index: 10; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
        
        .overlay-title { position: absolute; bottom: 12px; left: 12px; right: 12px; color: #fff; font-size: 13px; font-weight: 500; text-shadow: 0 1px 3px rgba(0,0,0,0.8); z-index: 10; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        
        /* Відмітка перегляду */
        .video-card.watched .video-thumb { filter: grayscale(50%) brightness(0.8); }
        .video-card.watched::before, .video-card.watched::after { content: ''; position: absolute; top: 50%; left: 50%; width: 60px; height: 3px; background: var(--accent-red); z-index: 20; pointer-events: none; box-shadow: 0 0 10px rgba(0,0,0,.5); border-radius: 2px; }
        .video-card.watched::before { transform: translate(-50%, -50%) rotate(45deg); }
        .video-card.watched::after { transform: translate(-50%, -50%) rotate(-45deg); }

        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(5px);opacity:0;transition:opacity .3s ease}
        .modal.show{display:flex;opacity:1}
        .modal-content{width:100%;max-width:1000px;padding:20px;position:relative;transition:transform .2s ease-out}
        .iframe-wrapper{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;background:#000;box-shadow:0 15px 40px rgba(0,0,0,.6)}
        .iframe-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
        .close-btn{position:absolute;top:-20px;right:20px;color:#fff;font-size:40px;cursor:pointer;line-height:1;z-index:10;text-shadow:0 2px 4px rgba(0,0,0,.5);font-weight:300;transition:color .2s}
        .close-btn:hover{color:var(--accent-red)}

        .site-footer{text-align:center;padding:60px 0 40px;font-size:11px;color:var(--date-color);text-transform:uppercase;letter-spacing:2px}
        .loading-state { text-align: center; color: var(--month-color); padding: 40px; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }

        @media (max-width:600px){
            body{padding:15px 15px 0px}
            .site-title{font-size:36px}
            .video-grid { grid-template-columns: 1fr; gap: 15px; }
            .modal-content{padding:10px}
            .close-btn{right:10px;top:-30px}
        }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div class="header-top">
        <h1 class="site-title">Кіноархів</h1>
        <div class="header-subinfo">
            <span id="videoCounter">0 ВІДЕО</span>
            <span class="dot-separator">•</span>
            <a href="https://instagram.com/taras.maksymiak/" target="_blank" rel="noopener noreferrer" class="insta-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                INSTAGRAM
            </a>
        </div>
    </div>

    <div class="content-flex" id="app">
        <div class="loading-state">Завантаження архіву...</div>
    </div>
    
    <div class="site-footer">© 2026 ТАРАС МАКСИМʼЯК</div>
</div>

<div id="videoModal" class="modal" onclick="closeModal()">
    <div class="modal-content" id="modalContent" onclick="event.stopPropagation()">
        <div class="close-btn" onclick="closeModal()">&times;</div>
        <div class="iframe-wrapper">
            <iframe id="ytIframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>
    var API_KEY = 'AIzaSyBk_r3wrlYczHybeZtnPBID4zK_yv_XuHw';
    var UPLOADS_ID = 'UUhN1_4a8atyqkFcNIJx6MlA'; 
    var CACHE_KEY = 'yt_archive_data', CACHE_TIME_KEY = 'yt_archive_time', CACHE_TTL = 10800000; // 3 години
    
    var DOM = {
        app: document.getElementById('app'),
        counter: document.getElementById('videoCounter'),
        modal: document.getElementById('videoModal'),
        iframe: document.getElementById('ytIframe')
    };

    var allVideos = [];
    var watchedVideos = [];

    // Зчитуємо історію переглядів
    try {
        var storedWatched = localStorage.getItem('my_watched_videos');
        if (storedWatched) {
            watchedVideos = JSON.parse(storedWatched);
            if (!Array.isArray(watchedVideos)) watchedVideos = [];
        }
    } catch(e) { watchedVideos = []; }

    function init() {
        var now = Date.now();
        var cachedData = localStorage.getItem(CACHE_KEY);
        var cachedTime = localStorage.getItem(CACHE_TIME_KEY);
        var isCacheValid = cachedData && cachedTime && (now - parseInt(cachedTime, 10)) < CACHE_TTL;

        if (cachedData) {
            try { 
                allVideos = JSON.parse(cachedData); 
                renderArchive(); 
            } catch(e) { allVideos = []; }
        }

        if (!isCacheValid || allVideos.length === 0) {
            fetchAPI('', [])
                .then(function(fetchedVideos) {
                    allVideos = fetchedVideos;
                    // Сортуємо від найновішого до найстарішого
                    allVideos.sort((a, b) => new Date(b.dateStr) - new Date(a.dateStr));
                    
                    localStorage.setItem(CACHE_KEY, JSON.stringify(allVideos));
                    localStorage.setItem(CACHE_TIME_KEY, now.toString());
                    renderArchive(); 
                })
                .catch(function(err) {
                    if (allVideos.length === 0) DOM.app.innerHTML = '<div class="loading-state" style="color:red;">Помилка завантаження відео.</div>';
                });
        }
    }

    function fetchAPI(pageToken, videosList) {
        var url = 'https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=' + UPLOADS_ID + '&maxResults=50&key=' + API_KEY;
        if (pageToken) url += '&pageToken=' + pageToken;

        return fetch(url).then(function(res) {
            if (!res.ok) throw new Error('API Error');
            return res.json();
        }).then(function(data) {
            if (data && data.items) {
                for (var i = 0; i < data.items.length; i++) {
                    var item = data.items[i];
                    if (!item.snippet || !item.snippet.publishedAt || !item.snippet.resourceId) continue;
                    
                    var t = item.snippet.thumbnails || {};
                    var thumb = (t.high && t.high.url) || (t.standard && t.standard.url) || (t.maxres && t.maxres.url) || (t.medium && t.medium.url) || (t.default && t.default.url) || '';

                    videosList.push({
                        id: item.snippet.resourceId.videoId,
                        title: item.snippet.title,
                        thumb: thumb,
                        dateStr: item.snippet.publishedAt
                    });
                }
            }
            if (data.nextPageToken) {
                return fetchAPI(data.nextPageToken, videosList);
            }
            return videosList;
        });
    }

    function renderArchive() {
        if (!allVideos || allVideos.length === 0) {
            DOM.app.innerHTML = '<div class="loading-state">Архів поки порожній.</div>';
            DOM.counter.innerText = "0 ВІДЕО";
            return;
        }

        DOM.counter.innerText = allVideos.length + " ВІДЕО";

        // Групуємо відео по роках і місяцях
        var grouped = {};
        var monthsNames = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];

        allVideos.forEach(function(vid) {
            var d = new Date(vid.dateStr);
            var y = d.getFullYear();
            var m = d.getMonth();
            var day = d.getDate();

            if (!grouped[y]) grouped[y] = {};
            if (!grouped[y][m]) grouped[y][m] = [];
            
            vid.dayText = day + ' ' + monthsNames[m].substring(0, 3).toLowerCase() + '.';
            grouped[y][m].push(vid);
        });

        var html = '';
        var years = Object.keys(grouped).sort((a,b) => b - a); // Роки по спаданню

        years.forEach(function(year) {
            html += '<div class="year-section">';
            html += '<h2 class="year-title">' + year + '</h2>';

            var months = Object.keys(grouped[year]).sort((a,b) => b - a); // Місяці по спаданню
            
            months.forEach(function(monthIndex) {
                html += '<div class="month-section">';
                html += '<h3 class="month-title">' + monthsNames[monthIndex] + '</h3>';
                html += '<div class="video-grid">';

                var vidsInMonth = grouped[year][monthIndex];
                vidsInMonth.forEach(function(vid) {
                    var watchedClass = watchedVideos.indexOf(vid.id) !== -1 ? 'watched' : '';
                    html += `
                        <a href="https://www.youtube.com/watch?v=${vid.id}" class="video-card ${watchedClass}" onclick="openModal(event, '${vid.id}', this)">
                            <img src="${vid.thumb}" class="video-thumb" loading="lazy" alt="">
                            <div class="date-badge">${vid.dayText}</div>
                            <div class="overlay-title">${vid.title}</div>
                        </a>
                    `;
                });

                html += '</div></div>'; // end video-grid & month-section
            });
            html += '</div>'; // end year-section
        });

        DOM.app.innerHTML = html;
    }

    window.mark = function(id, el) {
        if (watchedVideos.indexOf(id) === -1) {
            watchedVideos.push(id);
            try { localStorage.setItem('my_watched_videos', JSON.stringify(watchedVideos)); } catch(e) {}
        }
        if(el) el.classList.add('watched');
    }

    window.openModal = function(e, id, el) {
        e.preventDefault();
        mark(id, el); 
        DOM.iframe.src = 'https://www.youtube.com/embed/' + id + '?autoplay=1';
        DOM.modal.classList.add('show');
        document.body.style.overflow = 'hidden'; 
    }

    window.closeModal = function() {
        DOM.iframe.src = '';
        DOM.modal.classList.remove('show');
        document.body.style.overflow = 'auto'; 
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    setTimeout(init, 0);
</script>
</body>
</html>
