<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тарас Максимʼяк — 365</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌓</text></svg>">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #fff; color: #222; margin: 0; padding: 20px; overflow-x: hidden; }
       .main-wrapper { max-width: 1400px; margin: 0 auto; display: none; }
        
       .intro-text { max-width: 700px; margin: 10px 0 30px 0; font-size: 16px; line-height: 1.6; color: #333; font-family: 'Courier New', Courier, ui-monospace, monospace; }
       .intro-text p { margin-bottom: 0; }

       .year-header { font-size: 40px; font-weight: 700; margin: 0 0 10px 0; line-height: 1; }
       .season-header { font-size: 14px; font-weight: 700; color: #e62117; text-transform: uppercase; letter-spacing: 2px; margin: 30px 0 10px; }
       .month-header { color: #555; font-size: 18px; font-weight: 600; text-transform: uppercase; margin: 15px 0; letter-spacing: 1px; }
        
       .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
       .day-cell { aspect-ratio: 16/9; position: relative; background: #f8f8f8; border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; }
       .day-cell.empty-day { background: transparent; overflow: visible; } 

       .date-container { position: absolute; top: 8px; left: 10px; right: 10px; display: flex; flex-direction: row; align-items: baseline; gap: 6px; z-index: 10; pointer-events: none; }
       .date-num { font-size: 18px; font-weight: 800; line-height: 1; color: #ccc; }
       .day-name { font-size: 10px; font-weight: 500; text-transform: uppercase; color: #ccc; opacity: 0.6; }

       .has-video.date-num { color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.9); }
       .has-video.day-name { color: #fff; opacity: 0.7; text-shadow: 0 1px 2px rgba(0,0,0,0.9); }

       .video-link { display: block; width: 100%; height: 100%; position: absolute; inset: 0; cursor: pointer; z-index: 5; border-radius: 6px; overflow: hidden; }
       .video-thumb { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
       .video-link:hover.video-thumb { transform: scale(1.03); }
       .video-link::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 30%, transparent 60%, rgba(0,0,0,0.9) 100%); pointer-events: none; }
        
       .overlay-title { position: absolute; bottom: 10px; left: 10px; right: 10px; color: #fff; font-size: 11px; font-weight: 500; text-shadow: 0 1px 2px #000; z-index: 10; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.9; }
        
       .day-cell.watched.video-thumb { filter: none; opacity: 0.8; }
       .day-cell.watched.video-link::before,.day-cell.watched.video-link::after { content: ''; position: absolute; top: 50%; left: 50%; width: 150%; height: 3px; background: #e62117; z-index: 20; pointer-events: none; box-shadow: 0 0 5px rgba(0,0,0,0.3); }
       .day-cell.watched.video-link::before { transform: translate(-50%, -50%) rotate(45deg); }
       .day-cell.watched.video-link::after { transform: translate(-50%, -50%) rotate(-45deg); }

        @media (max-width: 1024px) {.calendar-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 600px) { 
            body { padding: 15px; } 
           .intro-text { font-size: 16px; margin: 10px 0 30px 0; }
           .calendar-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; } 
           .year-header { font-size: 32px; border-bottom: none; padding-bottom: 0; }
           .date-num { font-size: 16px; }
           .day-name { font-size: 9px; }
        }
        #loading { font-size: 12px; color: #999; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>
<div id="loading">Завантаження...</div>
<div class="main-wrapper" id="main">
    <div class="intro-text">
        <p>Я кинув собі досить конкретний виклик — знімати і публікувати по одному відео щодня. Без відмазок. Цілий рік: 365 днів — 365 відео.</p>
    </div>
    <div id="app"></div>
</div>

<script>
    const API_KEY = 'AIzaSyC918RPw_8amuFXKD0ztETJMSjTHx4rUWc';
    const UPLOADS_ID = 'UUhN1_4a8atyqkFcNIJx6MlA'; 
    
    // START: Feb 18, 2026
    const START_YEAR = 2026;
    const START_MONTH = 1; // 1 = Лютий
    const START_DAY = 18;
    
    const app = document.getElementById('app');
    const loading = document.getElementById('loading');
    const mainWrapper = document.getElementById('main');
    
    const videosMap = {};
    let watchedVideos =;
    
    try { 
        watchedVideos = JSON.parse(localStorage.getItem('my_watched_videos') |

| ''); 
    } catch (e) { watchedVideos =; }

    const weekDays = ["НД", "ПН", "ВТ", "СР", "ЧТ", "ПТ", "СБ"];
    const monthsNames = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];

    async function init() {
        try {
            let pageToken = '';
            // Захисний таймаут для запиту, щоб не висіло вічно
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);

            do {
                const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${UPLOADS_ID}&maxResults=50&key=${API_KEY}${pageToken? `&pageToken=${pageToken}` : ''}`;
                const res = await fetch(url, { signal: controller.signal });
                
                if (res.ok) {
                    const data = await res.json();
                    if (data.items) {
                        data.items.forEach(item => {
                            if (item.snippet && item.snippet.publishedAt) {
                                videosMap] = item;
                            }
                        });
                    }
                    pageToken = data.nextPageToken;
                } else {
                    break; // Якщо API заблокував запит (403), перериваємо цикл і малюємо пусту сітку
                }
            } while (pageToken);
            
            clearTimeout(timeoutId);
        } catch (e) {
            console.warn("API Error or Timeout. Proceeding to render grid anyway.", e);
        } finally {
            // ГАРАНТОВАНИЙ РЕНДЕР
            try {
                render();
            } catch (err) {
                console.error("Render failed:", err);
                app.innerHTML = "<p>Сталася помилка відмальовки.</p>";
            }
            // ГАРАНТОВАНЕ ЗНЯТТЯ ЛОАДЕРА
            loading.style.display = 'none';
            mainWrapper.style.display = 'block';
        }
    }

    function getSeason(m) {
        if (m === 11 |

| m <= 1) return "ЗИМА";
        if (m >= 2 && m <= 4) return "ВЕСНА";
        if (m >= 5 && m <= 7) return "ЛІТО";
        return "ОСІНЬ";
    }

    function render() {
        const today = new Date();
        let loop = new Date(START_YEAR, START_MONTH, 1);
        let curYear = 0, lastSeason = "";
        let finalHTML = ""; 

        while (loop <= today) {
            const y = loop.getFullYear();
            const m = loop.getMonth();
            const seas = getSeason(m);

            if (y!== curYear) {
                finalHTML += `<div class="header-container"><h2 class="year-header">${y}</h2></div>`;
                curYear = y;
                lastSeason = "";
            }
            if (seas!== lastSeason) {
                finalHTML += `<div class="season-header">${seas}</div>`;
                lastSeason = seas;
            }
            
            finalHTML += createMonthHTML(y, m);
            loop.setMonth(m + 1);
        }
        app.innerHTML = finalHTML; 
    }

    function createMonthHTML(y, m) {
        let monthHTML = `<div class="month-header">${monthsNames[m]}</div><div class="calendar-grid">`;
        let firstDay = (y === START_YEAR && m === START_MONTH)? START_DAY : 1;
        let daysInMonth = new Date(y, m + 1, 0).getDate();
        
        let currentDow = new Date(y, m, firstDay).getDay();

        for (let d = firstDay; d <= daysInMonth; d++) {
            const dayName = weekDays;
            currentDow = (currentDow + 1) % 7; 
            
            const key = `${y}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            const vid = videosMap[key];
            
            let cellClass = 'day-cell empty-day';
            const dateBlock = `<div class="date-container"><span class="date-num">${d}</span><span class="day-name">${dayName}</span></div>`;

            if (vid && vid.snippet) {
                const id = vid.snippet.resourceId? vid.snippet.resourceId.videoId : '';
                
                // Безпечне отримання картинки
                let thumb = "";
                if (vid.snippet.thumbnails) {
                    const t = vid.snippet.thumbnails;
                    thumb = (t.maxres && t.maxres.url)? t.maxres.url : ((t.medium && t.medium.url)? t.medium.url : '');
                }

                if (watchedVideos.includes(id)) cellClass += ' watched';
                cellClass = cellClass.replace('empty-day', 'has-video');
                
                const title = vid.snippet.title |

| "";

                monthHTML += `
                <div class="${cellClass}">
                    ${dateBlock}
                    <a href="https://www.youtube.com/watch?v=${id}" target="_blank" class="video-link" onclick="markWatched('${id}', this.parentElement)">
                        <img src="${thumb}" class="video-thumb" loading="lazy">
                        <div class="overlay-title">${title}</div>
                    </a>
                </div>`;
            } else {
                monthHTML += `<div class="${cellClass}">${dateBlock}</div>`;
            }
        }
        monthHTML += `</div>`;
        return monthHTML;
    }

    window.markWatched = function(id, el) {
        if (!watchedVideos.includes(id)) {
            watchedVideos.push(id);
            try {
                localStorage.setItem('my_watched_videos', JSON.stringify(watchedVideos));
            } catch(e) {}
        }
        el.classList.add('watched');
    }

    init();
</script>
</body>
</html>
