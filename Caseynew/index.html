<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Нові відео Кейсі</title>
    <style>
        body { background-color: #111; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .header { padding: 20px; text-align: center; font-size: 20px; font-weight: bold; }
        .video-container { width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .controls { margin-top: 30px; display: flex; gap: 15px; }
        .btn { padding: 15px 25px; font-size: 16px; background-color: #333; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn-primary { background-color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header" id="status">Завантаження...</div>
    
    <div class="video-container" id="player-wrapper">
        </div>

    <div class="controls" id="controls" style="display: none;">
        <button class="btn btn-primary" onclick="markWatchedAndNext()">▶ Переглянуто. Наступне</button>
    </div>

    <script>
        // Масив для нових відео (починаючи з 10 травня 2026 року)
        // Сюди потрібно буде додавати ID нових випусків у хронологічному порядку
        const newVideoIds = [
            // "ID_НОВОГО_ВІДЕО_1",
            // "ID_НОВОГО_ВІДЕО_2"
        ];

        let currentIndex = parseInt(localStorage.getItem('caseyNewIndex')) || 0;

        function loadVideo() {
            if (newVideoIds.length === 0) {
                document.getElementById('status').innerText = "Масив відео порожній. Додай нові ID в код.";
                return;
            }

            if (currentIndex < newVideoIds.length) {
                let currentId = newVideoIds[currentIndex];
                document.getElementById('status').innerText = `Відео ${currentIndex + 1} з ${newVideoIds.length}`;
                
                // Використовуємо yewtu.be (проксі) замість youtube.com
                document.getElementById('player-wrapper').innerHTML = `
                    <iframe src="https://yewtu.be/embed/${currentId}?autoplay=0" allowfullscreen></iframe>
                `;
                document.getElementById('controls').style.display = "flex";
            } else {
                document.getElementById('status').innerText = "Ти переглянув усі нові відео!";
                document.getElementById('player-wrapper').innerHTML = "";
                document.getElementById('controls').innerHTML = `
                    <button class="btn" onclick="localStorage.removeItem('caseyNewIndex'); location.reload();">Скинути прогрес</button>
                `;
            }
        }

        function markWatchedAndNext() {
            currentIndex++;
            localStorage.setItem('caseyNewIndex', currentIndex);
            loadVideo();
        }

        document.addEventListener("DOMContentLoaded", loadVideo);
    </script>
</body>
</html>
