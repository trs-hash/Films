<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Нові відео Кейсі</title>
    <style>
        body { background-color: #111; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .header { padding: 20px; text-align: center; font-size: 20px; font-weight: bold; line-height: 1.4; }
        .sub-status { font-size: 14px; color: #888; font-weight: normal; }
        .video-container { width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .controls { margin-top: 30px; display: flex; justify-content: center; width: 100%; gap: 15px; }
        .btn { padding: 15px 25px; font-size: 16px; background-color: #333; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn-primary { background-color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header" id="status">Завантаження...</div>
    
    <div class="video-container" id="player-wrapper"></div>

    <div class="controls" id="controls" style="display: none;"></div>

    <script>
        // Масив для нових відео
        const newVideoIds = [
            // "ID_НОВОГО_ВІДЕО_1",
            // "ID_НОВОГО_ВІДЕО_2"
        ];

        let currentIndex = parseInt(localStorage.getItem('caseyNewIndex')) || 0;

        function loadVideo() {
            // 1. Якщо масив взагалі порожній
            if (newVideoIds.length === 0) {
                document.getElementById('status').innerText = "Немає нових епізодів";
                document.getElementById('player-wrapper').innerHTML = "";
                document.getElementById('controls').style.display = "none";
                return;
            }

            // 2. Якщо всі відео переглянуті (показуємо останнє відео з масиву)
            if (currentIndex >= newVideoIds.length) {
                let lastId = newVideoIds[newVideoIds.length - 1];
                document.getElementById('status').innerHTML = "Немає нових епізодів<br><span class='sub-status'>Останнє відео (Переглянуто)</span>";
                
                document.getElementById('player-wrapper').innerHTML = `
                    <iframe src="https://yewtu.be/embed/${lastId}?autoplay=0" allowfullscreen></iframe>
                `;
                document.getElementById('controls').style.display = "none"; // Ховаємо кнопку "Наступне"
                return;
            }

            // 3. Якщо є непереглянуті відео
            let currentId = newVideoIds[currentIndex];
            document.getElementById('status').innerText = `Відео ${currentIndex + 1} з ${newVideoIds.length}`;
            
            document.getElementById('player-wrapper').innerHTML = `
                <iframe src="https://yewtu.be/embed/${currentId}?autoplay=0" allowfullscreen></iframe>
            `;
            document.getElementById('controls').style.display = "flex";
            document.getElementById('controls').innerHTML = `
                <button class="btn btn-primary" onclick="markWatchedAndNext()">▶ Переглянуто. Наступне</button>
            `;
        }

        function markWatchedAndNext() {
            currentIndex++;
            localStorage.setItem('caseyNewIndex', currentIndex);
            loadVideo();
        }

        document.addEventListener("DOMContentLoaded", loadVideo);
    </script>
</body>
</html>
