<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casey Neistat - Latest Vlog</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #111; 
            color: white; 
            font-family: sans-serif; 
        }
        .video-container { 
            width: 100%; 
            max-width: 1000px; 
            aspect-ratio: 16 / 9; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>
    <div class="video-container" id="videoContainer">
        <p>Завантаження...</p>
    </div>

    <script>
        const channelId = 'UCtinbF-Q-fVthA0qrYQTgXQ';
        const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                if (data.items && data.items.length > 0) {
                    const latestVideo = data.items[0];
                    const videoId = latestVideo.link.split('v=')[1];
                    // Використовуємо альтернативний домен для вбудовування
                    const iframeSrc = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=0`;
                    
                    document.getElementById('videoContainer').innerHTML = `
                        <iframe src="${iframeSrc}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    `;
                }
            })
            .catch(error => {
                document.getElementById('videoContainer').innerHTML = '<p>Помилка завантаження відео.</p>';
            });
    </script>
</body>
</html>
